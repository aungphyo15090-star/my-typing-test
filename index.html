<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Master - Full Keyboard Edition</title>
    <link href="https://mmwebfonts.comquas.com/fonts/pyidaungsu.css" rel="stylesheet">
    <style>
        :root { --bg: #f8f9fa; --sidebar: #2c3e50; --accent: #e67e22; --skin: #ffdbac; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 300px; background: var(--sidebar); color: white; display: flex; flex-direction: column; box-shadow: 3px 0 15px rgba(0,0,0,0.2); }
        .sidebar-header { padding: 25px; font-size: 1.3rem; font-weight: bold; border-bottom: 2px solid #34495e; text-align: center; background: #1a252f; }
        .lesson-container { flex: 1; overflow-y: auto; padding: 15px; }
        .lesson-item { padding: 14px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 14px; background: rgba(255,255,255,0.05); }
        .lesson-item.active { background: var(--accent); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .app-card { background: white; width: 100%; max-width: 1000px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        #display-text { font-size: 24px; background: #fafafa; padding: 25px; border-radius: 15px; min-height: 100px; line-height: 2; border: 1px solid #eee; margin-bottom: 20px; word-break: break-word; }
        .correct { color: #27ae60; }
        .incorrect { background: #e74c3c; color: white; border-radius: 4px; }
        .active-char { border-bottom: 4px solid var(--accent); background: rgba(230, 126, 34, 0.1); }

        input { width: 100%; padding: 15px; font-size: 22px; border: 2px solid #ddd; border-radius: 12px; outline: none; font-family: 'Pyidaungsu'; margin-bottom: 20px; }

        .hands-area { display: flex; justify-content: center; gap: 60px; margin-bottom: 15px; }
        .hand-svg { width: 130px; height: auto; }
        .finger { fill: var(--skin); stroke: #c69c6d; stroke-width: 1.5; transition: 0.1s; transform-origin: center bottom; }
        .active-finger { fill: var(--accent) !important; transform: translateY(-10px); }

        /* Full Keyboard Layout */
        .keyboard { background: #34495e; padding: 15px; border-radius: 15px; width: 100%; box-shadow: 0 8px 0 #1a252f; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; }
        .key { background: #fefefe; color: #333; height: 55px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 14px; font-weight: bold; flex: 1; border-bottom: 4px solid #bdc3c7; position: relative; min-width: 40px; }
        .key .s-char { font-size: 12px; color: #7f8c8d; margin-bottom: 2px; }
        .key.active-kb { background: var(--accent); color: white; border-bottom: none; transform: translateY(4px); }
        .key.active-kb .s-char { color: #ffe0b2; }
        .key.shift-key { flex: 2; background: #95a5a6; color: white; }
        .key.space { flex: 8; background: #ecf0f1; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header"> Typing Master Pro </div>
    <div class="lesson-container" id="lesson-list"></div>
</div>

<div class="main-content">
    <div class="app-card">
        <h3 id="lesson-title" style="text-align:center; margin-top:0;">သင်ခန်းစာ</h3>
        <div id="display-text"></div>
        <input type="text" id="input-field" placeholder="စတင်ရိုက်နှိပ်ပါ..." autocomplete="off" autofocus>

        <div class="hands-area">
            <svg class="hand-svg" viewBox="0 0 200 200">
                <path id="L5" class="finger" d="M30,120 Q30,60 50,60 L60,60 Q80,60 80,120 Z" />

                <path id="L3" class="finger" d="M95,100 Q95,30 115,30 L125,30 Q145,30 145,100 Z" />
                <path id="L2" class="finger" d="M130,110 Q130,50 150,50 L160,50 Q180,50 180,110 Z" />
                <path id="L1" class="finger" d="M160,150 Q195,150 195,185 L175,205 Q140,205 140,170 Z" />
            </svg>
            <svg class="hand-svg" viewBox="0 0 200 200">
                <path id="R1" class="finger" d="M40,150 Q5,150 5,185 L25,205 Q60,205 60,170 Z" />
                <path id="R2" class="finger" d="M20,110 Q20,50 40,50 L50,50 Q70,50 70,110 Z" />
                <path id="R3" class="finger" d="M55,100 Q55,30 75,30 L85,30 Q105,30 105,100 Z" />
                <path id="R4" class="finger" d="M90,110 Q90,40 110,40 L120,40 Q140,40 140,110 Z" />
                <path id="R5" class="finger" d="M120,120 Q120,60 140,60 L150,60 Q170,60 170,120 Z" />
            </svg>
        </div>

        <div class="keyboard" id="kb-ui"></div>
    </div>
</div>
