<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aung Phyo Win - Myanmar Typing Master Pro</title>
    <link href="https://mmwebfonts.comquas.com/fonts/pyidaungsu.css" rel="stylesheet">
    <style>
        :root { --bg: #eef2f7; --sidebar: #1e272e; --accent: #f39c12; --skin: #ffdbac; --white: #ffffff; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 300px; background: var(--sidebar); color: white; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.3); }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #34495e; }
        .user-name { font-size: 1.5rem; color: var(--accent); font-weight: bold; text-shadow: 0 0 10px rgba(243,156,18,0.5); animation: glow 2s infinite alternate; }
        @keyframes glow { from { opacity: 0.8; } to { opacity: 1; text-shadow: 0 0 20px var(--accent); } }
        
        .lesson-container { flex: 1; overflow-y: auto; padding: 15px; }
        .lesson-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; background: rgba(255,255,255,0.05); transition: 0.3s; font-size: 14px; border-left: 5px solid transparent; }
        .lesson-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .lesson-item.active { background: var(--accent); color: black; font-weight: bold; border-left-color: #fff; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; align-items: center; }
        .app-card { background: var(--white); width: 100%; max-width: 1000px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }

        /* Timer Control */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 12px; }
        .timer-select select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-family: 'Pyidaungsu'; }
        .stat-box { font-weight: bold; color: var(--sidebar); font-size: 1.1rem; }

        /* Text Display */
        #display-text { font-size: 24px; line-height: 2; background: #fcfcfc; padding: 25px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 20px; min-height: 150px; }
        .correct { color: #2ecc71; }
        .incorrect { background: #e74c3c; color: white; border-radius: 4px; }
        .active-char { border-bottom: 4px solid var(--accent); background: rgba(243,156,18,0.1); }

        input { width: 100%; padding: 15px; font-size: 22px; border: 2px solid #ddd; border-radius: 10px; outline: none; font-family: 'Pyidaungsu'; margin-bottom: 20px; }

        /* Visual Keyboard (Computer Style) */
        .keyboard { background: #2c3e50; padding: 15px; border-radius: 15px; width: 100%; box-shadow: 0 8px 0 #1a252f; }
        .kb-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 6px; }
        .key { background: #eee; color: #333; height: 45px; min-width: 45px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; font-size: 14px; font-weight: bold; flex: 1; border-bottom: 3px solid #ccc; }
        .key span.s-char { font-size: 11px; color: #7f8c8d; }
        .key.active-kb { background: var(--accent); color: white; border-bottom: none; transform: translateY(2px); }
        .key.space { flex: 8; }
        .key.shift-key { flex: 2; background: #95a5a6; color: white; }

        /* Hands */
        .hands-area { display: flex; justify-content: center; gap: 60px; margin-bottom: 10px; }
        .hand-svg { width: 130px; height: auto; }
        .finger { fill: var(--skin); stroke: #c69c6d; stroke-width: 1.5; transition: 0.1s; transform-origin: center bottom; }
        .active-finger { fill: var(--accent) !important; transform: translateY(-10px); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="user-name">Aung Phyo Win</div>
        <div style="font-size: 0.8rem; margin-top: 5px; opacity: 0.7;">Myanmar Typing Master</div>
    </div>
    <div class="lesson-container" id="lesson-list"></div>
</div>

<div class="main-content">
    <div class="app-card">
        <div class="controls">
            <div class="timer-select">
                အချိန်ရွေးရန်: 
                <select id="timer-setting">
                    <option value="60">60 Seconds</option>
                    <option value="120">120 Seconds</option>
                </select>
            </div>
            <div class="stat-box">Time Left: <span id="time-display">60</span>s</div>
            <div class="stat-box">WPM: <span id="wpm-display">0</span></div>
        </div>

        <div id="display-text"></div>
        <input type="text" id="input-field" placeholder="စာရိုက်ခြင်းကို စတင်လိုက်ပါ..." autocomplete="off">

        <div class="hands-area">
            <svg class="hand-svg" viewBox="0 0 200 200"><path id="L5" class="finger" d="M30,120 Q30,60 50,60 L60,60 Q80,60 80,120 Z" /><path id="L4" class="finger" d="M60,110 Q60,40 80,40 L90,40 Q110,40 110,110 Z" /><path id="L3" class="finger" d="M95,100 Q95,30 115,30 L125,30 Q145,30 145,100 Z" /><path id="L2" class="finger" d="M130,110 Q130,50 150,50 L160,50 Q180,50 180,110 Z" /><path id="L1" class="finger" d="M160,150 Q195,150 195,185 L175,205 Q140,205 140,170 Z" /></svg>
            <svg class="hand-svg" viewBox="0 0 200 200"><path id="R1" class="finger" d="M40,150 Q5,150 5,185 L25,205 Q60,205 60,170 Z" /><path id="R2" class="finger" d="M20,110 Q20,50 40,50 L50,50 Q70,50 70,110 Z" /><path id="R3" class="finger" d="M55,100 Q55,30 75,30 L85,30 Q105,30 105,100 Z" /><path id="R4" class="finger" d="M90,110 Q90,40 110,40 L120,40 Q140,40 140,110 Z" /><path id="R5" class="finger" d="M120,120 Q120,60 140,60 L150,60 Q170,60 170,120 Z" /></svg>
        </div>

        <div class="keyboard" id="kb-ui"></div>
        
        <div style="text-align: center; margin-top: 20px; color: #888; font-size: 12px;">
            Created by Aung Phyo Win &copy; 2024
        </div>
    </div>
</div>

<script>
    const lessons = [
        { title: "ကကြီး - အခန်း", text: "ကကြီး ကလေး ငို၊ ကိုကို ချော့လို့ နို့စို့စို့။ ကကြီးသည် ဗျည်းအက္ခရာများတွင် ပထမဆုံး အက္ခရာဖြစ်ပြီး ကလေးငယ်များအတွက် အလွန် ရင်းနှီးသော စာလုံးဖြစ်သည်။" },
        { title: "ခကွေး - အခန်း", text: "ခကွေး ကွေးကွေး၊ ခွေးကလေးကို ကျွေးကျွေး။ ခကွေး အက္ခရာကို ရေးသားရာတွင် ဝိုင်းဝန်းသော ပုံစံဖြင့် ရေးသားရပြီး စာလုံးအလှ ရေးရာတွင် အခြေခံကျပါသည်။" },
        { title: "ဂငယ် - အခန်း", text: "ဂငယ် ငယ်ငယ်၊ ငါးကလေး ဖမ်းမယ်။ ဂငယ်သည် ရေးသားရ လွယ်ကူသော အက္ခရာဖြစ်ပြီး စကားလုံး အများအပြားတွင် ပါဝင်နေပါသည်။" },
        { title: "ဃကြီး - အခန်း", text: "ဃကြီး ကြီးမား၊ ဆင်ကြီးသွား။ ဃကြီးကို ရေးသားရာတွင် Shift key ကို အသုံးပြုရမည်ဖြစ်ပြီး စာလုံးအဆင့်မြင့် လေ့ကျင့်မှုအတွက် အရေးပါသည်။" },
        { title: "င - အခန်း", text: "င ကလေး ငြိမ်ငြိမ်၊ အိမ်မှာထိုင်။ ငါး၊ ငှက်၊ ငွေ စသော စကားလုံးများကို ရေးသားရာတွင် င အက္ခရာကို အသုံးပြုရပါသည်။" },
        { title: "ဗျည်းအစုံ (က မှ အ)", text: "က ခ ဂ ဃ င စ ဆ ဇ ဈ ည ဋ ဌ ဍ ဎ ဏ တ ထ ဒ ဓ န ပ ဖ ဗ ဘ မ ယ ရ လ ဝ သ ဟ ဠ အ" }
    ];

    const keyboardLayout = [
        ['ဆ','တ','န','မ','အ','ပ','က','င','သ','စ'],
        ['ေ','ှ','ိ','်','ါ','့','ြ','ု','ူ','း'],
        ['ဖ','ထ','ခ','လ','ဘ','ည','ာ','ယ','ဝ','၏']
    ];
    const shiftLayout = [
        ['ဍ','ဋ','ဏ','ဣ','ဤ','ဥ','ဦ','ဧ','သြ','၌'],
        ['ဗ','ှ','ီ','်','ာ','့','ွ','ူ','ူး','၏'],
        ['ဃ','ဌ','ခြ','ဠ','ဘ','ည','ါ','၌','၎','၏']
    ];

    const fingerMap = {
        'ဆ':'L5','ေ':'L5','ဖ':'L5','ဍ':'L5','ဗ':'L5','ဃ':'L5',
        'တ':'L4','ှ':'L4','ထ':'L4','ဋ':'L4','ဌ':'L4',
        'န':'L3','ိ':'L3','ခ':'L3','ဏ':'L3','ီ':'L3',
        'မ':'L2','အ':'L2','်':'L2','ါ':'L2','လ':'L2','ဘ':'L2','ဣ':'L2','ဤ':'L2','ဠ':'L2',
        'ပ':'R2','က':'R2','့':'R2','ြ':'R2','ည':'R2','ာ':'R2','ဥ':'R2','ဦ':'R2','ွ':'R2',
        'င':'R3','ု':'R3','ယ':'R3','ဧ':'R3','ူ':'R3',
        'သ':'R4','ူ':'R4','ဝ':'R4','သြ':'R4','၎':'R4',
        'စ':'R5','း':'R5','၏':'R5','၌':'R5',' ':'R1'
    };

    let timer, timeLeft, isRunning = false, currentIndex = 0;

    function createKeyboard() {
        const kb = document.getElementById('kb-ui');
        kb.innerHTML = '';
        keyboardLayout.forEach((row, rIdx) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'kb-row';
            row.forEach((key, kIdx) => {
                const keyDiv = document.createElement('div');
                keyDiv.className = 'key';
                keyDiv.dataset.char = key;
                keyDiv.dataset.shift = shiftLayout[rIdx][kIdx];
                keyDiv.innerHTML = `<span class="s-char">${shiftLayout[rIdx][kIdx]}</span><span>${key}</span>`;
                rowDiv.appendChild(keyDiv);
            });
            kb.appendChild(rowDiv);
        });
        kb.innerHTML += `<div class="kb-row"><div class="key shift-key" id="key-shift">Shift</div><div class="key space" data-char=" ">Space</div></div>`;
    }

    function loadLesson(idx) {
        currentIndex = idx;
        const lesson = lessons[idx];
        document.getElementById('display-text').innerHTML = lesson.text.split('').map((c, i) => `<span class="${i===0?'active-char':''}">${c}</span>`).join('');
        document.getElementById('input-field').value = '';
        renderSidebar();
        resetTimer();
        updateVisuals(lesson.text[0]);
    }

    function resetTimer() {
        clearInterval(timer);
        isRunning = false;
        timeLeft = parseInt(document.getElementById('timer-setting').value);
        document.getElementById('time-display').innerText = timeLeft;
    }

    function startTimer() {
        isRunning = true;
        timer = setInterval(() => {
