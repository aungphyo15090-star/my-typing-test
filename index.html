<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Pro - 100 Lessons Edition</title>
    <link href="https://mmwebfonts.comquas.com/fonts/pyidaungsu.css" rel="stylesheet">
    <style>
        :root { --bg: #f0f2f5; --main: #2c3e50; --accent: #e67e22; --skin: #ffe0bd; --white: #fff; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Lesson List */
        .sidebar { width: 320px; background: var(--main); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #1a252f; text-align: center; border-bottom: 2px solid var(--accent); }
        .lesson-list { flex: 1; overflow-y: auto; padding: 10px; }
        .lesson-btn { width: 100%; padding: 10px; margin-bottom: 5px; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 5px; cursor: pointer; text-align: left; font-size: 13px; }
        .lesson-btn.active { background: var(--accent); }

        /* Main Display Area */
        .content { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: var(--white); width: 100%; max-width: 1000px; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        
        #text-display { font-size: 24px; line-height: 1.8; padding: 20px; background: #f9f9f9; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; text-align: left; min-height: 100px; }
        .char-next { border-bottom: 3px solid var(--accent); background: #fff4e6; }
        .char-correct { color: #27ae60; }
        .char-wrong { background: #e74c3c; color: white; border-radius: 3px; }

        input { width: 100%; padding: 15px; font-size: 22px; border: 2px solid #ddd; border-radius: 8px; outline: none; margin-bottom: 20px; font-family: 'Pyidaungsu'; }

        /* Hand Guide UI (Image 9 Style) */
        .hands-container { display: flex; justify-content: center; gap: 60px; margin-bottom: 15px; }
        .hand { position: relative; width: 180px; height: 140px; }
        .finger-tip { position: absolute; width: 28px; height: 35px; background: var(--skin); border-radius: 15px 15px 5px 5px; border: 1px solid #d35400; transition: 0.2s; }
        .finger-tip.active { background: var(--accent); transform: scale(1.2); box-shadow: 0 0 10px var(--accent); border-color: white; }
        
        /* Left Hand Positions */
        #L5 { left: 10px; top: 50px; } #L4 { left: 45px; top: 25px; } #L3 { left: 80px; top: 15px; } #L2 { left: 115px; top: 25px; } #L1 { left: 145px; top: 90px; border-radius: 15px; width: 35px; }
        /* Right Hand Positions */
        #R1 { right: 145px; top: 90px; border-radius: 15px; width: 35px; } #R2 { right: 115px; top: 25px; } #R3 { right: 80px; top: 15px; } #R4 { right: 45px; top: 25px; } #R5 { right: 10px; top: 50px; }

        /* Keyboard UI */
        .keyboard { background: #34495e; padding: 12px; border-radius: 12px; width: 100%; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
        .key { background: white; min-width: 42px; height: 48px; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; border-bottom: 3px solid #bdc3c7; flex: 1; }
        .key.active { background: var(--accent); color: white; border-bottom: none; transform: translateY(2px); }
        .key span.sh { font-size: 10px; color: #95a5a6; }
        .key.space { flex: 7; }
        .key.side { flex: 1.5; background: #bdc3c7; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div style="font-size: 18px; color: var(--accent);">AUNG PHYO WIN</div>
        <small>Lessons 1 - 100</small>
    </div>
    <div class="lesson-list" id="lesson-btns"></div>
</div>

<div class="content">
    <div class="app-card">
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold;">
            <div id="lesson-title">Lesson 1</div>
            <div>Speed: <span id="wpm">0</span> WPM</div>
        </div>

        <div id="text-display"></div>
        <input type="text" id="type-input" placeholder="ဒီမှာ စတင်ရိုက်နှိပ်ပါ..." autocomplete="off">

        <div class="hands-container">
            <div class="hand">
                <div id="L5" class="finger-tip"></div><div id="L4" class="finger-tip"></div>
                <div id="L3" class="finger-tip"></div><div id="L2" class="finger-tip"></div>
                <div id="L1" class="finger-tip"></div>
            </div>
            <div class="hand">
                <div id="R1" class="finger-tip"></div><div id="R2" class="finger-tip"></div>
                <div id="R3" class="finger-tip"></div><div id="R4" class="finger-tip"></div>
                <div id="R5" class="finger-tip"></div>
            </div>
        </div>

        <div class="keyboard" id="kb-grid"></div>
    </div>
</div>

<script>
    // လေ့ကျင့်ခန်း ၁၀၀ စာရင်း (နမူနာအချို့၊ သင်နှစ်သက်သလို ထပ်တိုးနိုင်သည်)
    const lessons = [
        { t: "ကကြီး ကဗျာ (အစ)", c: "ကကြီး ကလေး ငို၊ ကိုကို ချော့လို့ နို့စို့စို့။ ကကြီးသည် ဗျည်းအက္ခရာများတွင် ပထမဆုံးဖြစ်ပြီး စတင်သင်ယူသူတိုင်းအတွက် အခြေခံအကျဆုံး စာလုံးဖြစ်ပါသည်။" },
        { t: "ခကွေး ကဗျာ", c: "ခကွေး ကွေးကွေး၊ ခွေးကလေးကို ကျွေးကျွေး။ ခကွေးကို ရေးသားရာတွင် စာလုံးအဝိုင်းများကို စနစ်တကျ ရေးသားတတ်ရန် အထူးလိုအပ်ပါသည်။" },
        { t: "မြန်မာနိုင်ငံအကြောင်း", c: "မြန်မာနိုင်ငံသည် သဘာဝသယံဇာတ ပေါကြွယ်ဝပြီး တောတောင်ရေမြေ လှပသော နိုင်ငံဖြစ်သည်။ ဧရာဝတီမြစ်သည် နိုင်ငံ၏ အဓိက အသက်သွေးကြော ဖြစ်ပါသည်။" },
        { t: "ဂျပန်နိုင်ငံအကြောင်း", c: "ဂျပန်နိုင်ငံသည် အရှေ့အာရှတွင် တည်ရှိသော ကျွန်းနိုင်ငံတစ်ခုဖြစ်ပြီး နည်းပညာနှင့် စည်းကမ်းကောင်းမွန်မှုတွင် ကမ္ဘာကျော်သည်။ တိုကျိုမြို့သည် လူဦးရေ အထူထပ်ဆုံးမြို့ဖြစ်သည်။" },
        { t: "စင်ကာပူနိုင်ငံအကြောင်း", c: "စင်ကာပူနိုင်ငံသည် သေးငယ်သော်လည်း စီးပွားရေး အလွန်တောင့်တင်းသော နိုင်ငံဖြစ်သည်။ ကမ္ဘာ့အသန့်ရှင်းဆုံး မြို့ပြနိုင်ငံများထဲတွင် တစ်ခုအပါအဝင် ဖြစ်သည်။" }
    ];
    // ၁၀၀ ပြည့်အောင် Loop ပတ်၍ Generate လုပ်ထားခြင်း (စာသားများကို နောက်မှ ပြင်နိုင်သည်)
    for(let i=6; i<=100; i++) {
        lessons.push({ t: `Lesson ${i}: Typing Practice`, c: `ဒါကတော့ နံပါတ် ${i} မြောက် လေ့ကျင့်ခန်း ဖြစ်ပါတယ်။ စာလုံးများကို မှန်ကန်အောင် အနှေးနှင့် အမြန် ရောနှော၍ လေ့ကျင့်ပေးပါ။` });
    }

    const kbLayout = [
        [{n:'ဆ',s:'ဍ'},{n:'တ',s:'ဋ'},{n:'န',s:'ဏ'},{n:'မ',s:'ဣ'},{n:'အ',s:'ဤ'},{n:'ပ',s:'ဥ'},{n:'က',s:'ဦ'},{n:'င',s:'ဧ'},{n:'သ',s:'သြ'},{n:'စ',s:'၌'}],
        [{n:'ေ',s:'ဗ'},{n:'ှ',s:'ှ'},{n:'ိ',s:'ီ'},{n:'်',s:'်'},{n:'ါ',s:'ာ'},{n:'့',s:'့'},{n:'ြ',s:'ွ'},{n:'ု',s:'ူ'},{n:'ူ',s:'ူး'},{n:'း',s:'၏'}],
        [{n:'ဖ',s:'ဃ'},{n:'ထ',s:'ဌ'},{n:'ခ',s:'ခြ'},{n:'လ',s:'ဠ'},{n:'ဘ',s:'ဘ'},{n:'ည',s:'ည'},{n:'ာ',s:'ါ'},{n:'ယ',s:'၌'},{n:'ဝ',s:'၎'}]
    ];

    const fingerMap = {
        'ဆ':'L5','ေ':'L5','ဖ':'L5','ဍ':'L5','ဗ':'L5','ဃ':'L5','တ':'L4','ှ':'L4','ထ':'L4','ဋ':'L4','ဌ':'L4','န':'L3','ိ':'L3','ခ':'L3','ဏ':'L3','ီ':'L3','ခြ':'L3','မ':'L2','အ':'L2','်':'L2','ါ':'L2','လ':'L2','ဘ':'L2','ဣ':'L2','ဤ':'L2','ဠ':'L2','ပ':'R2','က':'R2','့':'R2','ြ':'R2','ည':'R2','ာ':'R2','ဥ':'R2','ဦ':'R2','ွ':'R2','င':'R3','ု':'R3','ယ':'R3','ဧ':'R3','ူ':'R3','သ':'R4','ူ':'R4','ဝ':'R4','သြ':'R4','၎':'R4','စ':'R5','း':'R5','၏':'R5','၌':'R5',' ':'R1'
    };

    let curIdx = 0, startTime = null;

    function init() {
        const btnBox = document.getElementById('lesson-btns');
        lessons.forEach((l, i) => {
            const b = document.createElement('button');
            b.className = 'lesson-btn';
            b.innerText = `${i+1}. ${l.t}`;
            b.onclick = () => loadLesson(i);
            btnBox.appendChild(b);
        });

        const grid = document.getElementById('kb-grid');
        kbLayout.forEach((row, rIdx) => {
            const div = document.createElement('div'); div.className = 'kb-row';
            if(rIdx===0) div.innerHTML += '<div class="key side">Tab</div>';
            if(rIdx===1) div.innerHTML += '<div class="key side">Caps</div>';
            if(rIdx===2) div.innerHTML += '<div class="key side" id="sh-left">Shift</div>';
            row.forEach(k => {
                div.innerHTML += `<div class="key" data-n="${k.n}" data-s="${k.s}"><span class="sh">${k.s}</span>${k.n}</div>`;
            });
            if(rIdx===1) div.innerHTML += '<div class="key side">Enter</div>';
            if(rIdx===2) div.innerHTML += '<div class="key side">Shift</div>';
            grid.appendChild(div);
        });
        grid.innerHTML += `<div class="kb-row"><div class="key space" data-n=" ">Space</div></div>`;
        
        loadLesson(0);
    }

    function loadLesson(idx) {
        curIdx = idx;
        document.getElementById('lesson-title').innerText = lessons[idx].t;
        document.getElementById('text-display').innerHTML = lessons[idx].c.split('').map((c,i) => `<span class="${i===0?'char-next':''}">${c}</span>`).join('');
        document.getElementById('type-input').value = '';
        document.querySelectorAll('.lesson-btn').forEach((b,i) => b.className = i===idx?'lesson-btn active':'lesson-btn');
        updateGuide(lessons[idx].c[0]);
        startTime = null;
    }

    function updateGuide(char) {
        document.querySelectorAll('.key, .finger-tip').forEach(el => el.classList.remove('active'));
        let target = document.querySelector(`.key[data-n="${char}"]`);
        if(!target) {
            target = document.querySelector(`.key[data-s="${char}"]`);
            if(target) {
                document.getElementById('sh-left').classList.add('active');
                document.getElementById('L5').classList.add('active');
            }
        }
        if(target) target.classList.add('active');
        const fId = fingerMap[char];
        if(fId) document.getElementById(fId).classList.add('active');
    }

    document.getElementById('type-input').addEventListener('input', (e) => {
        if(!startTime) startTime = new Date();
        const val = e.target.value;
        const text = lessons[curIdx].c;
        const spans = document.getElementById('text-display').querySelectorAll('span');
        
        spans.forEach((s, i) => {
            s.className = (val[i] == null) ? (i === val.length ? 'char-next' : '') : (val[i] === s.innerText ? 'char-correct' : 'char-wrong');
        });

        updateGuide(text[val.length] || '');
        
        const elapsed = (new Date() - startTime) / 60000;
        document.getElementById('wpm').innerText = Math.round((val.length / 5) / elapsed) || 0;

        if(val === text) {
            alert("အောင်မြင်ပါတယ်။ နောက်သင်ခန်းစာသို့ သွားပါမည်။");
            loadLesson((curIdx + 1) % lessons.length);
        }
    });

    init();
</script>
</body>
</html>
