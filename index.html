   <!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aung Phyo Win - Pro Myanmar Typing Master</title>
    <link href="https://mmwebfonts.comquas.com/fonts/pyidaungsu.css" rel="stylesheet">
    <style>
        :root { --main: #1a1a2e; --accent: #e94560; --white: #ffffff; }
        body { font-family: 'Pyidaungsu', sans-serif; background: #f0f2f5; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Security Overlay */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--main); z-index: 10000; display: flex; align-items: center; justify-content: center; color: white; }
        .login-box { text-align: center; background: #16213e; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px rgba(233,69,96,0.3); }
        .login-box input { padding: 12px; border-radius: 8px; border: none; margin-top: 15px; width: 200px; text-align: center; font-size: 18px; }

        /* Sidebar & Name Animation */
        .sidebar { width: 320px; background: var(--main); color: white; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.2); }
        .name-container { padding: 20px; border-bottom: 1px solid #2a2a4a; overflow: hidden; }
        .moving-name { font-size: 24px; font-weight: bold; white-space: nowrap; animation: rainbow-move 10s linear infinite; }
        @keyframes rainbow-move {
            0% { color: #ff0000; transform: translateX(100%); }
            14% { color: #ff7f00; }
            28% { color: #ffff00; }
            42% { color: #00ff00; }
            56% { color: #0000ff; }
            70% { color: #4b0082; }
            84% { color: #8b00ff; }
            100% { color: #ff0000; transform: translateX(-100%); }
        }

        .lesson-list { flex: 1; overflow-y: auto; padding: 15px; }
        .lesson-item { padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 14px; border-left: 4px solid transparent; }
        .lesson-item:hover { background: rgba(233,69,96,0.2); }
        .lesson-item.active { background: var(--accent); color: white; border-left-color: white; }

        /* Main Area */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; width: 100%; max-width: 1050px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        #display-area { font-size: 26px; line-height: 1.8; padding: 25px; background: #f9f9f9; border-radius: 15px; border: 1px solid #eee; margin-bottom: 20px; min-height: 120px; }
        .char-next { border-bottom: 4px solid var(--accent); background: rgba(233,69,96,0.1); }
        .char-correct { color: #27ae60; }
        .char-wrong { background: #e74c3c; color: white; border-radius: 4px; }

        input { width: 100%; padding: 18px; font-size: 24px; border: 2px solid #ddd; border-radius: 12px; outline: none; font-family: 'Pyidaungsu'; margin-bottom: 20px; }
        input:focus { border-color: var(--accent); }

        /* Keyboard UI (Desktop Style) */
        .keyboard { background: #d1d4d9; padding: 15px; border-radius: 12px; width: 100%; user-select: none; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; }
        .key { background: white; min-width: 48px; height: 55px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-bottom: 4px solid #adb5bd; font-size: 14px; font-weight: bold; flex: 1; }
        .key .en-label { position: absolute; top: 4px; left: 6px; font-size: 10px; color: #888; }
        .key .mm-sh { font-size: 11px; color: #7f8c8d; margin-bottom: 2px; }
        .key.active { background: var(--accent); color: white; transform: translateY(3px); border-bottom: none; }
        
        .key.tab, .key.caps { flex: 1.6; align-items: flex-start; padding-left: 10px; }
        .key.enter { flex: 2; align-items: flex-end; padding-right: 10px; }
        .key.shift-l, .key.shift-r { flex: 2.3; }
        .key.space { flex: 8; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #eee; }
        .time-btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; background: #eee; margin-left: 10px; }
        .time-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color: var(--accent);">AUNG PHYO WIN</h2>
        <p>ကိုယ်ပိုင်လေ့ကျင့်ခန်းစနစ်သို့ ဝင်ရောက်ရန် Code ရိုက်ပါ</p>
        <input type="password" id="pass-field" placeholder="Access Code">
        <button onclick="unlock()" style="display:block; margin: 20px auto; padding: 10px 30px; cursor:pointer;">ဝင်မည်</button>
        <p id="err-msg" style="color: #ff4d4d;"></p>
    </div>
</div>

<div class="sidebar">
    <div class="name-container">
        <div class="moving-name">AUNG PHYO WIN - AUNG PHYO WIN - AUNG PHYO WIN</div>
    </div>
    <div class="lesson-list" id="lesson-items"></div>
    <div style="padding: 15px; background: rgba(0,0,0,0.3);">
        <h4 style="margin: 0 0 10px 0;">🏆 Top Rankings</h4>
        <div id="leaderboard"></div>
    </div>
</div>

<div class="main-content">
    <div class="app-card">
        <div class="controls">
            <div>
                ချိန်ကိုက်: 
                <button class="time-btn active" onclick="setTime(60, this)">60s</button>
                <button class="time-btn" onclick="setTime(120, this)">120s</button>
            </div>
            <div style="font-weight: bold; font-size: 18px;">
                အချိန်: <span id="timer-val">60</span>s | WPM: <span id="wpm-val">0</span>
            </div>
        </div>

        <div id="display-area"></div>
        <input type="text" id="type-input" placeholder="စာရိုက်ခြင်းကို စတင်လိုက်ပါ..." autofocus autocomplete="off">

        <div class="keyboard" id="kb-ui"></div>
    </div>
</div>

<script>
    const ACCESS_CODE = "1234";
    const lessonData = [
        { name: "ကကြီး ကဗျာ", text: "ကကြီး ကလေး ငို၊ ကိုကို ချော့လို့ နို့စို့စို့။ ကကြီးသည် ဗျည်းများတွင် ပထမဆုံး အက္ခရာ ဖြစ်သည်။" },
        { name: "ခကွေး ကဗျာ", text: "ခကွေး ကွေးကွေး၊ ခွေးကလေးကို ကျွေးကျွေး။ ခကွေးကို အကွေ့အဝိုင်းပုံစံဖြင့် ရေးသားရသည်။" },
        { name: "ဂငယ် ကဗျာ", text: "ဂငယ် ငယ်ငယ်၊ ငါးကလေး ဖမ်းမယ်။ ဂငယ်သည် အရွယ်အစား သေးငယ်သော အက္ခရာ ဖြစ်သည်။" },
        { name: "ဃကြီး ကဗျာ", text: "ဃကြီး ကြီးမား၊ ဆင်ကြီးသွား။ ဃကြီးကို ရေးသားရာတွင် Shift ကို အသုံးပြုရသည်။" },
        { name: "င ကဗျာ", text: "င ကလေး ငြိမ်ငြိမ်၊ အိမ်မှာထိုင်။ ငါး၊ ငှက်၊ ငွေ စသော စကားလုံးများတွင် သုံးသည်။" },
        { name: "ဗျည်း ၃၃ လုံး", text: "က ခ ဂ ဃ င စ ဆ ဇ ဈ ည ဋ ဌ ဍ ဎ ဏ တ ထ ဒ ဓ န ပ ဖ ဗ ဘ မ ယ ရ လ ဝ သ ဟ ဠ အ" }
    ];

    const row1 = [['Q','ဆ','ဍ'],['W','တ','ဋ'],['E','န','ဏ'],['R','မ','ဣ'],['T','အ','ဤ'],['Y','ပ','ဥ'],['U','က','ဦ'],['I','င','ဧ'],['O','သ','သြ'],['P','စ','၌']];
    const row2 = [['A','ေ','ဗ'],['S','ှ','ှ'],['D','ိ','ီ'],['F','်','်'],['G','ါ','ာ'],['H','့','့'],['J','ြ','ွ'],['K','ု','ူ'],['L','ူ','ူး'],[';','း','၏']];
    const row3 = [['Z','ဖ','ဃ'],['X','ထ','ဌ'],['C','ခ','ခြ'],['V','လ','ဠ'],['B','ဘ','ဘ'],['N','ည','ည'],['M','ာ','ါ'],[',','ယ','၌'],['.','ဝ','၎']];

    let timerLimit = 60, timeLeft = 60, isRunning = false, interval, curLesson = 0;

    function unlock() {
        if(document.getElementById('pass-field').value === ACCESS_CODE) {
            document.getElementById('login-overlay').style.display = 'none';
            init();
        } else {
            document.getElementById('err-msg').innerText = "Code မှားနေပါသည်!";
        }
    }

    function init() {
        buildKeyboard();
        loadLesson(0);
        updateBoard();
    }

    function buildKeyboard() {
        const kb = document.getElementById('kb-ui');
        kb.innerHTML = '';
        const rows = [row1, row2, row3];
        rows.forEach((r, idx) => {
            const div = document.createElement('div'); div.className = 'kb-row';
            if(idx === 0) div.innerHTML += '<div class="key tab">Tab</div>';
            if(idx === 1) div.innerHTML += '<div class="key caps">Caps</div>';
            if(idx === 2) div.innerHTML += '<div class="key shift-l" id="sh-l">Shift</div>';
            
            r.forEach(k => {
                div.innerHTML += `<div class="key" data-mm="${k[1]}" data-sh="${k[2]}"><span class="en-label">${k[0]}</span><span class="mm-sh">${k[2]}</span><span>${k[1]}</span></div>`;
            });

            if(idx === 0) div.innerHTML += '<div class="key">\\</div>';
            if(idx === 1) div.innerHTML += '<div class="key enter">Enter</div>';
            if(idx === 2) div.innerHTML += '<div class="key shift-r" id="sh-r">Shift</div>';
            kb.appendChild(div);
        });
        kb.innerHTML += `<div class="kb-row"><div class="key space" data-mm=" ">Space</div></div>`;
    }

    function loadLesson(idx) {
        curLesson = idx;
        const text = lessonData[idx].text;
        document.getElementById('display-area').innerHTML = text.split('').map((c, i) => `<span class="${i===0?'char-next':''}">${c}</span>`).join('');
        document.getElementById('type-input').value = '';
        renderList();
        stopTimer();
        highlight(text[0]);
    }

    function highlight(char) {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        let target = document.querySelector(`.key[data-mm="${char}"]`);
        if(!target) {
            target = document.querySelector(`.key[data-sh="${char}"]`);
            if(target) document.getElementById('sh-l').classList.add('active');
        }
        if(target) target.classList.add('active');
    }

    function setTime(sec, btn) {
        timerLimit = timeLeft = sec;
        document.getElementById('timer-val').innerText = sec;
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        stopTimer();
    }

    function stopTimer() {
        clearInterval(interval);
        isRunning = false;
        timeLeft = timerLimit;
        document.getElementById('timer-val').innerText = timeLeft;
        document.getElementById('wpm-val').innerText = '0';
    }

    document.getElementById('type-input').addEventListener('input', (e) => {
        if(!isRunning) {
            isRunning = true;
            interval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    saveResult();
                    loadLesson(curLesson);
                }
            }, 1000);
        }
        const val = e.target.value;
        const text = lessonData[curLesson].text;
        const spans = document.getElementById('display-area').querySelectorAll('span');
        
        spans.forEach((s, i) => {
            s.className = (val[i] == null) ? (i === val.length ? 'char-next' : '') : (val[i] === s.innerText ? 'char-correct' : 'char-wrong');
        });

        highlight(text[val.length] || '');
        const wpm = Math.round((val.length / 5) / ((timerSet = (timerLimit - timeLeft) || 1) / 60));
        document.getElementById('wpm-val').innerText = wpm;

        if(val === text) { clearInterval(interval); saveResult(); loadLesson((curLesson+1)%lessonData.length); }
    });

    function saveResult() {
        const name = prompt("Aung Phyo Win ရေ... သင့်နာမည်ကို ရိုက်ထည့်ပါ -");
        if(name) {
            let ranks = JSON.parse(localStorage.getItem('apw_ranks') || '[]');
            ranks.push({ name, wpm: document.getElementById('wpm-val').innerText });
            ranks.sort((a,b) => b.wpm - a.wpm);
            localStorage.setItem('apw_ranks', JSON.stringify(ranks.slice(0, 5)));
            updateBoard();
        }
    }

    function updateBoard() {
        const board = document.getElementById('leaderboard');
        const ranks = JSON.parse(localStorage.getItem('apw_ranks') || '[]');
        board.innerHTML = ranks.map((r, i) => `<div style="display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px solid #333;"><span>${i+1}. ${r.name}</span><b>${r.wpm} WPM</b></div>`).join('');
    }

    function renderList() {
        document.getElementById('lesson-items').innerHTML = lessonData.map((l, i) => `<div class="lesson-item ${i===curLesson?'active':''}" onclick="loadLesson(${i})">${i+1}. ${l.name}</div>`).join('');
    }
</script>
</body>
</html>
