<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUNG PHYO WIN - Original Complete Pro</title>
    <link href="https://mmwebfonts.comquas.com/fonts/pyidaungsu.css" rel="stylesheet">
    <style>
        :root { --main: #0f172a; --accent: #38bdf8; --p1: #f59e0b; --p2: #10b981; }
        body { font-family: 'Pyidaungsu', sans-serif; background: #020617; margin: 0; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #auth, #main-menu { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card { background: #1e293b; padding: 40px; border-radius: 20px; border: 2px solid var(--accent); text-align: center; }
        .menu-btn { width: 300px; padding: 18px; font-size: 18px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; margin: 10px; transition: 0.3s; }
        .btn-p { background: var(--accent); color: #000; }
        .btn-b { background: var(--p1); color: #000; }
        .header { padding: 10px 20px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; }
        .app-body { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 300px; background: #1e293b; overflow-y: auto; padding: 15px; border-right: 2px solid #334155; }
        .workspace { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .lesson-btn { padding: 10px; margin-bottom: 5px; background: #334155; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .lesson-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        #text-screen { flex: 1; background: white; color: #1e293b; border-radius: 12px; padding: 25px; font-size: 24px; line-height: 2.1; overflow-y: auto; text-align: justify; }
        .curr { border-bottom: 4px solid var(--accent); background: #e0f2fe; }
        .ok { color: #10b981; } .err { background: #ef4444; color: white; border-radius: 4px; }
        input.field { width: 100%; padding: 18px; font-size: 22px; border-radius: 10px; background: #1e293b; color: white; border: 2px solid #334155; outline: none; }
        .battle-grid { display: none; width: 100%; gap: 15px; }
        .p-box { flex: 1; background: #1e293b; padding: 15px; border-radius: 10px; border-top: 5px solid; }
        #res-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 10001; }
        .res-card { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; border: 3px solid var(--accent); }
    </style>
</head>
<body>

<div id="auth">
    <div class="card">
        <h1 style="color:var(--accent)">AUNG PHYO WIN</h1>
        <input type="password" id="pass" placeholder="Password (aungphyo529)" style="padding:12px; border-radius:8px; text-align:center;"> <br>
        <button class="menu-btn btn-p" onclick="login()">LOGIN</button>
    </div>
</div>

<div id="main-menu" style="display:none;">
    <h1 style="color:var(--accent)">ORIGINAL MASTER SYSTEM</h1>
    <button class="menu-btn btn-p" onclick="setMode('practice')">လေ့ကျင့်ခန်း (မူရင်းစာ ၁၅၀)</button>
    <button class="menu-btn btn-b" onclick="setMode('battle')">သူငယ်ချင်းနှင့်ပြိုင်မည် (BATTLE)</button>
</div>

<div class="header">
    <button onclick="location.reload()" style="background:none; color:var(--accent); border:1px solid; cursor:pointer; padding:5px 15px; border-radius:5px;">MENU</button>
    <div>WPM: <span id="wpm-display" style="color:var(--accent)">0</span></div>
    <div>Time: <span id="timer" style="color:var(--accent)">60</span>s</div>
</div>

<div class="app-body">
    <div class="sidebar" id="lesson-nav"></div>
    <div class="workspace">
        <div id="text-screen"></div>
        
        <input type="text" id="p-in" class="field" placeholder="စာသားများကို စတင်ရိုက်နှိပ်ပါ..." autocomplete="off">
        
        <div class="battle-grid" id="battle-ui">
            <div class="p-box" style="border-color:var(--p1)">
                <div style="color:var(--p1)">PLAYER 1 (WPM: <span id="p1-wpm">0</span>)</div>
                <input type="text" id="p1-in" class="field" placeholder="P1 ရိုက်ပါ...">
            </div>
            <div class="p-box" style="border-color:var(--p2)">
                <div style="color:var(--p2)">PLAYER 2 (WPM: <span id="p2-wpm">0</span>)</div>
                <input type="text" id="p2-in" class="field" placeholder="P2 ရိုက်ပါ...">
            </div>
        </div>
    </div>
</div>

<div id="res-modal">
    <div class="res-card">
        <h1 id="win-name" style="font-size:45px; color:var(--accent)">DONE!</h1>
        <p id="win-stats" style="font-size:20px;"></p>
        <button class="menu-btn btn-p" onclick="location.reload()">REPLAY</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnd(f, t, d) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.value = f; g.gain.value = 0.05;
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
    }

    const speak = (t) => {
        const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = 1;
        window.speechSynthesis.speak(u);
    };

    function login() {
        if(document.getElementById('pass').value === "aungphyo529") {
            document.getElementById('auth').style.display='none';
            document.getElementById('main-menu').style.display='flex';
        } else alert("Wrong Password!");
    }

    // --- အရင် Code ထဲက မူရင်းစာသားများ (Original Database) ---
    const originalTexts = [
        "ကကြီး ကလေး ငို၊ ကိုကို ချော့လို့ နို့စို့စို့။ ခကွေး ကွေးကွေး၊ ခွေးကလေးကို ကျွေးကျွေး။ ဂငယ် ငယ်ငယ်၊ ငါးကလေး ဖမ်းမယ်။ ဃကြီး ကြီးမား၊ ဆင်ကြီး သွား။ င ကလေး ငြိမ်ငြိမ်၊ အိမ်မှာ ထိုင်။",
        "စလုံး လုံးလုံး၊ ထမင်းလုံးကို စား။ ဆလိမ် လိမ်လိမ်၊ ကြိုးကလေးကို လိမ်။ ဇကွဲ ကွဲကွဲ၊ အိုးကလေး ကွဲ။ ဈမျဉ်းဆွဲ ဆွဲ၊ စာကြောင်း ဆွဲ။ ညလေး လေးလေး၊ ကလေးငယ် လေး။",
        "ဋသန်လျင်းချိတ် ဌဝမ်းဘဲ ဍရင်ကောက် ဎရေမှုတ် ဏကြီး တဝမ်းပူ ထဆင်ထူး ဒထွေး ဓအောက်ခြိုက် နငယ် ပစောက် ဖဦးထုပ် ဗထက်ခြိုက် ဘကုန်း မငယ် ယပက်လက် ရကောက် လငယ် ဝလုံး သငယ် ဟကြီး ဠကြီး အ။",
        "အနော်ရထာမင်းကြီးသည် ပုဂံနိုင်ငံတော်ကို တည်ထောင်ခဲ့ပြီး ဗုဒ္ဓဘာသာကို ထွန်းကားစေခဲ့သည်။ ကျန်စစ်သားမင်းသည် ထီးလိုမင်းလို စေတီတော်ကို တည်ခဲ့သည်။",
        "ဘုရင့်နောင်ကျော်ထင်နော်ရထာသည် ဒုတိယမြန်မာနိုင်ငံတော်ကို တည်ထောင်သည်။ အလောင်းမင်းတရားကြီးသည် ကုန်းဘောင်မင်းဆက်ကို စတင်ခဲ့သည်။",
        "ဗိုလ်ချုပ်အောင်ဆန်းနှင့် ရဲဘော်သုံးကျိပ်တို့သည် ဖက်ဆစ်ဂျပန်နှင့် နယ်ချဲ့အင်္ဂလိပ်တို့ကို တိုက်ထုတ်ခဲ့ပြီး ၁၉၄၈ ခုနှစ်တွင် လွတ်လပ်ရေး ရရှိခဲ့သည်။",
        "ရန်ကုန်မြို့သည် မြန်မာနိုင်ငံ၏ အကြီးဆုံး စီးပွားရေးမြို့တော် ဖြစ်သည်။ မန္တလေးမြို့သည် မြန်မာ့ယဉ်ကျေးမှု၏ ဗဟိုချက်ဖြစ်သည်။ နေပြည်တော်သည် မြို့တော်ဖြစ်သည်။",
        "ကမ္ဘာမကျေ မြန်မာပြည် တို့ဘိုးဘွား အမွေစစ်မို့ ချစ်မြတ်နိုးပေ။ ပြည်ထောင်စုကို အသက်ပေးလို့ တို့ကာကွယ်မလေ တို့မြေ တို့ရေ တို့ချစ်တဲ့ မြေ။",
        "အောင်ဆန်းဇာနည် ဗိုလ်ချုပ်အောင်ဆန်းဇာနည်။ သက်စွန့်ကြိုးပမ်း ဆောင်ရွက်ခဲ့လို့ လွတ်လပ်ရေး ရပြီ။ တို့ဗိုလ်ချုပ်လို လူတော် လူကောင်း ဖြစ်အောင် ကြိုးစားစို့။"
    ];

    const lessonData = [];
    for(let i=1; i<=150; i++) {
        let content = "";
        if(i <= 30) content = originalTexts[0] + " " + originalTexts[1];
        else if(i <= 60) content = originalTexts[2];
        else if(i <= 90) content = originalTexts[3] + " " + originalTexts[4];
        else if(i <= 120) content = originalTexts[5] + " " + originalTexts[6];
        else content = originalTexts[7] + " " + originalTexts[8];
        lessonData.push({ title: `အခန်း ${i}`, text: content });
    }

    let mode = 'practice', curL = 0, timerObj = null, timeRemain = 60;

    function setMode(m) {
        mode = m; document.getElementById('main-menu').style.display = 'none';
        if(m === 'battle') {
            document.getElementById('p-in').style.display = 'none';
            document.getElementById('battle-ui').style.display = 'flex';
            document.getElementById('lesson-nav').style.display = 'none';
        }
        init();
    }

    function init() {
        const nav = document.getElementById('lesson-nav');
        lessonData.forEach((l, i) => {
            const b = document.createElement('div'); b.className='lesson-btn';
            b.innerText = l.title; b.onclick = () => loadL(i); nav.appendChild(b);
        });
        loadL(0);
    }

    function loadL(idx) {
        curL = idx; const txt = lessonData[idx].text;
        document.getElementById('text-screen').innerHTML = txt.split('').map((c,i)=>`<span class="${i===0?'curr':''}">${c}</span>`).join('');
        document.querySelectorAll('.lesson-btn').forEach((b,i)=>b.classList.toggle('active', i===idx));
        reset();
    }

    function reset() {
        clearInterval(timerObj); timerObj = null; timeRemain = 60;
        document.getElementById('timer').innerText = timeRemain;
        document.querySelectorAll('input.field').forEach(i => i.value = '');
    }

    function finish(winnerName) {
        clearInterval(timerObj);
        document.getElementById('res-modal').style.display = 'flex';
        
        if(mode === 'battle') {
            if(winnerName === "P1") {
                document.getElementById('win-name').innerText = "PLAYER 1 WINS! 🏆";
                speak("Congratulations Player 1! You are the winner. Player 2, keep trying harder!");
            } else if(winnerName === "P2") {
                document.getElementById('win-name').innerText = "PLAYER 2 WINS! 🏆";
                speak("Congratulations Player 2! You are the winner. Player 1, keep trying harder!");
            } else {
                document.getElementById('win-name').innerText = "IT'S A DRAW! 🤝";
                speak("It is a draw! Both of you did an amazing job.");
            }
        } else {
            document.getElementById('win-name').innerText = "FINISHED! ✅";
            speak("Well done! Practice makes perfect.");
        }
    }

    function handleInput(e, pNum) {
        if(!timerObj) {
            timerObj = setInterval(() => {
                timeRemain--; document.getElementById('timer').innerText = timeRemain;
                if(timeRemain <= 0) finish(parseInt(document.getElementById('p1-wpm').innerText) > parseInt(document.getElementById('p2-wpm').innerText) ? "P1" : "P2");
            }, 1000);
        }

        const v = e.target.value, txt = lessonData[curL].text;
        const wpm = Math.round((v.length/5)/((60-timeRemain)/60)) || 0;
        if(pNum) document.getElementById(`p${pNum}-wpm`).innerText = wpm;
        else document.getElementById('wpm-display').innerText = wpm;

        if(v.length > 0) {
            if(v[v.length-1] === txt[v.length-1]) playSnd(600, 'sine', 0.05); 
            else playSnd(150, 'square', 0.1);
        }

        const sps = document.getElementById('text-screen').querySelectorAll('span');
        sps.forEach((s,i) => s.className = (v[i]==null)?(i===v.length?'curr':''):(v[i]===s.innerText?'ok':'err'));
        
        if(v === txt) finish(pNum === 1 ? "P1" : "P2");
    }

    document.getElementById('p-in').addEventListener('input', (e) => handleInput(e));
    document.getElementById('p1-in').addEventListener('input', (e) => handleInput(e, 1));
    document.getElementById('p2-in').addEventListener('input', (e) => handleInput(e, 2));
</script>
</body>
</html>
