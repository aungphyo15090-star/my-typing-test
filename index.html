<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Pro 150 - Aung Phyo Win</title>
    <link href="https://mmwebfonts.comquas.com/fonts/pyidaungsu.css" rel="stylesheet">
    <style>
        :root { --main: #1a1a2e; --accent: #f39c12; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Password Overlay */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--main); z-index: 9999; display: flex; justify-content: center; align-items: center; color: white; }
        .auth-box { text-align: center; background: #16213e; padding: 40px; border-radius: 20px; border: 2px solid var(--accent); }
        .auth-box input { padding: 10px; font-size: 18px; border-radius: 5px; border: none; margin-top: 15px; text-align: center; }

        /* Sidebar */
        .sidebar { width: 350px; background: var(--main); color: white; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        .sidebar-header { padding: 20px; background: #16213e; border-bottom: 3px solid var(--accent); text-align: center; }
        .lesson-list { flex: 1; overflow-y: auto; padding: 10px; }
        .lesson-btn { width: 100%; padding: 12px; margin-bottom: 5px; background: rgba(255,255,255,0.05); border: none; color: #ddd; border-radius: 6px; cursor: pointer; text-align: left; font-size: 13px; }
        .lesson-btn.active { background: var(--accent); color: white; font-weight: bold; }
        .grp-title { font-size: 11px; color: #888; padding: 15px 5px 5px; text-transform: uppercase; border-bottom: 1px solid #333; display: block; }

        /* Content Area */
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .card { background: var(--white); width: 100%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        
        #display { font-size: 24px; line-height: 2.2; padding: 25px; background: #fcfcfc; border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; text-align: justify; color: #333; min-height: 300px; }
        .next { border-bottom: 4px solid var(--accent); background: #fff9e6; }
        .ok { color: #27ae60; }
        .error { background: #e74c3c; color: white; border-radius: 4px; }

        input#input { width: 100%; padding: 15px; font-size: 22px; border: 2px solid #ddd; border-radius: 10px; outline: none; margin-bottom: 15px; font-family: 'Pyidaungsu'; }

        /* Hands */
        .hands { display: flex; justify-content: center; gap: 80px; margin-bottom: 15px; }
        .hand { position: relative; width: 160px; height: 100px; }
        .finger { position: absolute; width: 28px; height: 40px; background: #ffe0bd; border-radius: 12px 12px 4px 4px; border: 1px solid #c8a165; transition: 0.1s; }
        .finger.active { background: var(--accent); transform: translateY(-5px); box-shadow: 0 4px 10px rgba(243, 156, 18, 0.4); }
        #L5{left:0;top:35px} #L4{left:32px;top:10px} #L3{left:64px;top:0} #L2{left:96px;top:10px} #L1{left:128px;top:70px;width:35px;border-radius:15px}
        #R1{right:128px;top:70px;width:35px;border-radius:15px} #R2{right:96px;top:10px} #R3{right:64px;top:0} #R4{right:32px;top:10px} #R5{right:0;top:35px}

        /* Keyboard */
        .kb { background: #2c3e50; padding: 12px; border-radius: 12px; width: 100%; }
        .row { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
        .key { background: white; min-width: 42px; height: 48px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border-bottom: 3px solid #bdc3c7; flex: 1; position: relative; }
        .key.active { background: var(--accent); color: white; border-bottom: none; transform: translateY(2px); }
        .key .sh { position: absolute; top: 2px; left: 4px; font-size: 9px; color: #aaa; }
        .key.space { flex: 7; }

        .service { margin-top: 20px; text-align: center; font-size: 14px; color: #666; }
        .service a { color: #2980b9; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2>AUNG PHYO WIN Typing Master</h2>
        <p>ဝင်ရောက်ရန် Password ရိုက်ထည့်ပါ</p>
        <input type="password" id="pass-input" placeholder="Password">
        <br><br>
        <button onclick="checkPass()" style="padding: 10px 30px; background: var(--accent); border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold;">Enter</button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <strong style="color:var(--accent); font-size: 18px;">AUNG PHYO WIN</strong><br>
        <small>Master Key Edition</small>
    </div>
    <div class="lesson-list" id="lesson-nav"></div>
</div>

<div class="main">
    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:14px; font-weight:bold;">
            <span id="title">အခန်း ၁</span>
            <span>Speed: <span id="wpm">0</span> WPM</span>
        </div>
        <div id="display"></div>
        <input type="text" id="input" placeholder="စာသားများကို စတင်ရိုက်နှိပ်ပါ..." autocomplete="off">

        <div class="hands">
            <div class="hand"><div id="L5" class="finger"></div><div id="L4" class="finger"></div><div id="L3" class="finger"></div><div id="L2" class="finger"></div><div id="L1" class="finger"></div></div>
            <div class="hand"><div id="R1" class="finger"></div><div id="R2" class="finger"></div><div id="R3" class="finger"></div><div id="R4" class="finger"></div><div id="R5" class="finger"></div></div>
        </div>

        <div class="kb" id="kb-ui"></div>

        <div class="service">
            Customer Service Support: <a href="mailto:aungphyo52967@gmail.com">aungphyo52967@gmail.com</a>
        </div>
    </div>
</div>

<script>
    // Authentication Logic (Password: aungphyo529)
    function checkPass() {
        const p = document.getElementById('pass-input').value;
        if(p === "aungphyo529") {
            document.getElementById('auth-overlay').style.display = 'none';
        } else {
            alert("Password မှားယွင်းနေပါသည်။");
        }
    }

    const data = [];
    
    // Group 1: 1-20 Alphabet Poems (Extended)
    const alphabetSet = [
        "ကကြီး ကလေး ငို၊ ကိုကို ချော့လို့ နို့စို့စို့။ ခကွေး ကွေးကွေး၊ ခွေးကလေးကို ကျွေးကျွေး။ ဂငယ် ငယ်ငယ်၊ ငါးကလေး ဖမ်းမယ်။ ဃကြီး ကြီးမား၊ ဆင်ကြီး သွား။ င ကလေး ငြိမ်ငြိမ်၊ အိမ်မှာ ထိုင်။ စလုံး လုံးလုံး၊ ထမင်းလုံးကို စား။ ဆလိမ် လိမ်လိမ်၊ ကြိုးကလေးကို လိမ်။ ဇကွဲ ကွဲကွဲ၊ အိုးကလေး ကွဲ။ ဈမျဉ်းဆွဲ ဆွဲ၊ စာကြောင်း ဆွဲ။ ညလေး လေးလေး၊ ကလေးငယ် လေး။ ဋသန်လျင်းချိတ် ချိတ်၊ တံငါသည် ချိတ်။ ဌဝမ်းဘဲ ဘဲ၊ ရေထဲမှာ ဘဲ။ ဍရင်ကောက် ကောက်၊ လမ်းကလေး ကောက်။ ဎရေမှုတ် မှုတ်၊ ရေကို မှုတ်။ ဏကြီး ကြီးမား၊ ဂုဏ်အင်္ဂါ များ။ တဝမ်းပူ ပူ၊ ထမင်းအိုး ပူ။ ထဆင်ထူး ထူး၊ ထူးထူး ခြားခြား။ ဒဒွေး ဒွေးဒွေး၊ ဒေါ်ဒေါ် ပေး။ ဓအလံထူ ထူ၊ အလံကို ထူ။ နငယ် ငယ်ငယ်၊ ညီမလေး ငယ်။ ပစောက် စောက်စောက်၊ တွင်းကလေး စောက်။ ဖဦးထုပ် ထုပ်၊ ဦးထုပ်ကို ထုပ်။ ဗထက်ခြိုက် ခြိုက်၊ ထမင်းကို ခြိုက်။ ဘကုန်း ကုန်းကုန်း၊ လမ်းကလေး ကုန်း။ မလေး လေးလေး၊ ကလေးငယ် လေး။ ယပက်လက် လက်၊ လွယ်အိတ်ကို လက်။ ရကောက် ကောက်ကောက်၊ လမ်းကလေး ကောက်။ လငယ် ငယ်ငယ်၊ ငါးကလေး ဖမ်းမယ်။ ဝလုံး လုံးလုံး၊ ထမင်းလုံးကို စား။ သငယ် ငယ်ငယ်၊ ငါးကလေး ဖမ်းမယ်။ ဟဟားဟား ဟား၊ ရယ်လိုက်ကြ ဟား။ ဠကြီး ကြီးမား၊ ဆင်ကြီး သွား။ အ အအေး၊ အအေးကို သောက်။",
        // repeat or add extended variations to reach 20 lessons with very long texts
    ];

    for(let i=0; i<20; i++) {
        data.push({ title: `အခန်း ${i+1}: ဗျည်းကဗျာ (အကျယ်)`, text: alphabetSet[0] + " ဤသည်မှာ မြန်မာစာပေ၏ အခြေခံဗျည်း ၃၃ လုံးကို ကျွမ်းကျင်စွာ ရိုက်နှိပ်နိုင်ရန်အတွက် အထူးစီစဉ်ထားသော သင်ခန်းစာဖြစ်ပါသည်။ လက်ချောင်းများကို မှန်ကန်စွာအသုံးပြုပြီး အမြန်နှုန်းထက် တိကျမှုကို ပိုမိုဦးစားပေး လေ့ကျင့်ပေးပါရန် တိုက်တွန်းအပ်ပါသည်။" });
    }

    // Group 2: 21-50 Myanmar History (Very Long)
    for(let i=21; i<=50; i++) {
        data.push({ title: `အခန်း ${i}: မြန်မာ့သမိုင်းကြောင်း`, text: "မြန်မာနိုင်ငံ၏ သမိုင်းကြောင်းသည် အလွန်ရှည်လျားပြီး ဂုဏ်ယူဖွယ်ရာများဖြင့် ပြည့်နှက်နေပါသည်။ ပုဂံခေတ်တွင် အနော်ရထာမင်းကြီးသည် ပထမမြန်မာနိုင်ငံတော်ကို တည်ထောင်ခဲ့ပြီး ထေရဝါဒဗုဒ္ဓဘာသာကို စတင်အခြေချခဲ့သည်။ ထို့နောက် အင်းဝ၊ တောင်ငူ နှင့် ကုန်းဘောင်ခေတ်များအထိ မြန်မာ့စစ်အင်အားနှင့် စာပေယဉ်ကျေးမှုများသည် အရှေ့တောင်အာရှတွင် ထိပ်တန်းသို့ ရောက်ရှိခဲ့သည်။ သမိုင်းကို သိရှိခြင်းဖြင့် မိမိတို့၏ မျိုးချစ်စိတ်ဓာတ်ကို ပိုမိုနိုးကြားစေနိုင်ပါသည်။" });
    }

    // Group 3: 51-100 Cities of Myanmar (Detailed)
    const cities = [
        "ရန်ကုန်မြို့သည် မြန်မာနိုင်ငံ၏ အကြီးဆုံးမြို့တော်ဖြစ်ပြီး စီးပွားရေးအချက်အချာကျသော မြို့ဖြစ်သည်။ ရွှေတိဂုံစေတီတော်မြတ်ကြီးမှာ ကမ္ဘာကျော်ပြီး နိုင်ငံခြားသားများစွာ လာရောက်လည်ပတ်လေ့ရှိသည်။",
        "မန္တလေးမြို့သည် မြန်မာ့ယဉ်ကျေးမှုမြို့တော်ဖြစ်ပြီး ရှေးဟောင်းအဆောက်အအုံများနှင့် နန်းတော်ကြီးတို့မှာ ထင်ရှားလှပါသည်။",
        "နေပြည်တော်သည် လက်ရှိမြန်မာနိုင်ငံ၏ အုပ်ချုပ်ရေးမြို့တော်ဖြစ်ပြီး စနစ်တကျ တည်ဆောက်ထားသော လမ်းမကြီးများဖြင့် သပ်ရပ်လှပနေပါသည်။"
    ];
    for(let i=51; i<=100; i++) {
        data.push({ title: `အခန်း ${i}: မြန်မာပြည်မှမြို့များ`, text: cities[i % 3] + " ဤဒေသ၏ ထူးခြားသော ရာသီဥတုနှင့် ဒေသခံတို့၏ ဖော်ရွေပျူငှာမှုများကို တွေ့မြင်ရမည် ဖြစ်ပါသည်။ လေ့ကျင့်ခန်းကို ဆက်လက်လုပ်ဆောင်ပေးပါ။ နိုင်ငံတစ်ဝန်းရှိ မြို့ပြများ၏ တိုးတက်ပြောင်းလဲမှုများကို ဤသင်ခန်းစာတွင် လေ့လာနိုင်ပါသည်။" });
    }

    // Group 4: 101-150 Song Lyrics
    for(let i=101; i<=150; i++) {
        data.push({ title: `အခန်း ${i}: သီချင်းစာသား`, text: "မြန်မာပြည်ကြီး ငြိမ်းချမ်းပါစေ၊ တို့မြေ တို့ရေ တို့ချစ်တဲ့မြေ။ သာယာလှပတဲ့ တောတောင်ရေမြေများနဲ့ ပြည့်စုံတဲ့ မြန်မာပြည်ကြီးမှာ တို့အားလုံး စည်းစည်းလုံးလုံး နေထိုင်ကြမယ်။ ကမ္ဘာတည်သရွေ့ မြန်မာပြည်သည် တို့ရဲ့ အမိမြေ ဖြစ်ပါသည်။ သီချင်းစာသားများကို စည်းချက်ညီညီ ရိုက်နှိပ်ကြည့်ပါ။ ဤစာသားများသည် စိတ်ဓာတ်ခွန်အားကို ဖြစ်ပေါ်စေပါသည်။" });
    }

    const keys = [
        [{n:'ဆ',s:'ဍ'},{n:'တ',s:'ဋ'},{n:'န',s:'ဏ'},{n:'မ',s:'ဣ'},{n:'အ',s:'ဤ'},{n:'ပ',s:'ဥ'},{n:'က',s:'ဦ'},{n:'င',s:'ဧ'},{n:'သ',s:'သြ'},{n:'စ',s:'၌'}],
        [{n:'ေ',s:'ဗ'},{n:'ှ',s:'ှ'},{n:'ိ',s:'ီ'},{n:'်',s:'်'},{n:'ါ',s:'ာ'},{n:'့',s:'့'},{n:'ြ',s:'ွ'},{n:'ု',s:'ူ'},{n:'ူ',s:'ူး'},{n:'း',s:'၏'}],
        [{n:'ဖ',s:'ဃ'},{n:'ထ',s:'ဌ'},{n:'ခ',s:'ခြ'},{n:'လ',s:'ဠ'},{n:'ဘ',s:'ဘ'},{n:'ည',s:'ည'},{n:'ာ',s:'ါ'},{n:'ယ',s:'၌'},{n:'ဝ',s:'၎'}]
    ];

    const fMap = {'ဆ':'L5','ေ':'L5','ဖ':'L5','တ':'L4','ှ':'L4','ထ':'L4','န':'L3','ိ':'L3','ခ':'L3','မ':'L2','အ':'L2','်':'L2','ါ':'L2','လ':'L2','ဘ':'L2','ပ':'R2','က':'R2','့':'R2','ြ':'R2','ည':'R2','ာ':'R2','င':'R3','ု':'R3','ယ':'R3','သ':'R4','ဝ':'R4','စ':'R5','း':'R5',' ':'R1'};

    let cur = 0, time = null;

    function init() {
        const nav = document.getElementById('lesson-nav');
        let currentGrp = "";
        data.forEach((l, i) => {
            let grpName = i < 20 ? "ဗျည်းကဗျာ" : i < 50 ? "မြန်မာ့သမိုင်း" : i < 100 ? "မြို့များ" : "သီချင်း";
            if(grpName !== currentGrp){
                const t = document.createElement('span'); t.className = 'grp-title'; t.innerText = grpName;
                nav.appendChild(t); currentGrp = grpName;
            }
            const b = document.createElement('button'); b.className = 'lesson-btn';
            b.innerText = l.title; b.onclick = () => load(i); nav.appendChild(b);
        });

        const kb = document.getElementById('kb-ui');
        keys.forEach(r => {
            const d = document.createElement('div'); d.className = 'row';
            r.forEach(k => d.innerHTML += `<div class="key" data-n="${k.n}" data-s="${k.s}"><span class="sh">${k.s}</span>${k.n}</div>`);
            kb.appendChild(d);
        });
        kb.innerHTML += `<div class="row"><div class="key space" data-n=" ">Space Bar</div></div>`;
        load(0);
    }

    function load(idx) {
        cur = idx;
        document.getElementById('title').innerText = data[idx].title;
        document.getElementById('display').innerHTML = data[idx].text.split('').map((c,i) => `<span class="${i===0?'next':''}">${c}</span>`).join('');
        document.getElementById('input').value = '';
        document.querySelectorAll('.lesson-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
        update(data[idx].text[0]);
        time = null;
    }

    function update(c) {
        document.querySelectorAll('.key, .finger').forEach(el => el.classList.remove('active'));
        let k = document.querySelector(`.key[data-n="${c}"]`) || document.querySelector(`.key[data-s="${c}"]`);
        if(k) k.classList.add('active');
        if(fMap[c]) document.getElementById(fMap[c]).classList.add('active');
    }

    document.getElementById('input').addEventListener('input', (e) => {
        if(!time) time = new Date();
        const v = e.target.value, t = data[cur].text, spans = document.getElementById('display').querySelectorAll('span');
        spans.forEach((s, i) => s.className = (v[i] == null) ? (i === v.length ? 'next' : '') : (v[i] === s.innerText ? 'ok' : 'error'));
        update(t[v.length] || '');
        document.getElementById('wpm').innerText = Math.round((v.length/5)/((new Date()-time)/60000)) || 0;
        if(v === t) { if(cur < 149) load(cur+1); }
    });

    init();
</script>
</body>
</html>
