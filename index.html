<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aung Phyo Win - Typing Pro (Secure)</title>
    <link href="https://mmwebfonts.comquas.com/fonts/pyidaungsu.css" rel="stylesheet">
    <style>
        :root { --main: #2c3e50; --gold: #f39c12; --bg: #f5f6fa; --white: #ffffff; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; }
        
        /* Security Overlay */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--main); z-index: 9999; display: flex; align-items: center; justify-content: center; color: white; }
        .login-box { text-align: center; background: #34495e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box input { padding: 10px; border-radius: 5px; border: none; margin-top: 10px; font-size: 18px; text-align: center; }

        /* Sidebar & Layout */
        .wrapper { display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; background: var(--main); color: white; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        
        /* Leaderboard */
        .leaderboard { background: rgba(255,255,255,0.1); margin: 15px; padding: 15px; border-radius: 10px; flex-grow: 1; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #455a64; font-size: 14px; }
        
        /* Keyboard & UI */
        .app-card { background: var(--white); width: 100%; max-width: 1000px; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        #display-text { font-size: 24px; line-height: 1.8; background: #fafafa; padding: 20px; border-radius: 10px; margin-bottom: 20px; min-height: 120px; }
        .keyboard { background: #dcdde1; padding: 10px; border-radius: 10px; width: 100%; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
        .key { background: white; min-width: 45px; height: 50px; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 3px solid #bcbcbc; font-size: 13px; flex: 1; position: relative; }
        .key.active { background: var(--gold); color: white; transform: translateY(2px); border-bottom: none; }
        .key .en { position: absolute; top: 2px; left: 4px; font-size: 9px; color: #999; }
        .key.space { flex: 8; }
        
        .char-next { border-bottom: 3px solid var(--gold); background: #fffbe6; }
        .char-correct { color: #2ecc71; }
        .char-wrong { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>🔒 Security Lock</h2>
        <p>Aung Phyo Win ၏ ကိုယ်ပိုင် Website ဖြစ်ပါသည်</p>
        <input type="password" id="access-code" placeholder="Enter Access Code">
        <button onclick="checkAccess()" style="margin-top:10px; padding:10px 20px; cursor:pointer;">ဝင်မည်</button>
        <p id="login-msg" style="color: #e74c3c; margin-top:10px;"></p>
    </div>
</div>

<div class="wrapper">
    <div class="sidebar">
        <div style="padding: 20px; text-align: center; border-bottom: 1px solid #444;">
            <h3 style="color:var(--gold);">AUNG PHYO WIN</h3>
            <p style="font-size: 12px;">Typing Master Pro</p>
        </div>
        
        <div class="leaderboard">
            <h4 style="text-align:center;">🏆 Leaderboard</h4>
            <div id="rank-list">
                </div>
        </div>
    </div>

    <div class="content">
        <div class="app-card">
            <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
                <div>အချိန်: <span id="timer">60</span>s</div>
                <div>အမြန်နှုန်း: <span id="wpm">0</span> WPM</div>
                <button onclick="resetTest()">ပြန်စမည်</button>
            </div>

            <div id="display-text"></div>
            <input type="text" id="typing-input" placeholder="ဒီမှာ စတင်ရိုက်ပါ..." autocomplete="off">

            <div class="keyboard" id="kb-ui">
                </div>
        </div>
    </div>
</div>

<script>
    const MY_CODE = "1234"; // ဝင်ရောက်ရန် လျှို့ဝှက်နံပါတ်
    let leaderboardData = JSON.parse(localStorage.getItem('typing_ranks')) || [];

    function checkAccess() {
        const input = document.getElementById('access-code').value;
        if(input === MY_CODE) {
            document.getElementById('login-overlay').style.display = 'none';
            initApp();
        } else {
            document.getElementById('login-msg').innerText = "Access Code မှားယွင်းနေပါသည်။";
        }
    }

    const lessons = [
        "ကကြီး ကလေး ငို၊ ကိုကို ချော့လို့ နို့စို့စို့။ ကကြီးသည် မြန်မာဗျည်းများတွင် ပထမဆုံး အက္ခရာ ဖြစ်သည်။",
        "ခကွေး ကွေးကွေး၊ ခွေးကလေးကို ကျွေးကျွေး။ ခကွေးကို အကွေ့အဝိုင်းပုံစံဖြင့် ရေးသားရသည်။",
        "က ခ ဂ ဃ င စ ဆ ဇ ဈ ည ဋ ဌ ဍ ဎ ဏ တ ထ ဒ ဓ န ပ ဖ ဗ ဘ မ ယ ရ လ ဝ သ ဟ ဠ အ"
    ];

    const keysRow1 = [["Q","ဆ"],["W","တ"],["E","န"],["R","မ"],["T","အ"],["Y","ပ"],["U","က"],["I","င"],["O","သ"],["P","စ"]];
    const keysRow2 = [["A","ေ"],["S","ှ"],["D","ိ"],["F","်"],["G","ါ"],["H","့"],["J","ြ"],["K","ု"],["L","ူ"]];
    const keysRow3 = [["Z","ဖ"],["X","ထ"],["C","ခ"],["V","လ"],["B","ဘ"],["N","ည"],["M","ာ"]];

    let timer, timeLeft = 60, isRunning = false, currentText = "", charIdx = 0;

    function initApp() {
        buildKeyboard();
        updateLeaderboard();
        loadLesson();
    }

    function buildKeyboard() {
        const kb = document.getElementById('kb-ui');
        const rows = [keysRow1, keysRow2, keysRow3];
        rows.forEach(row => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'kb-row';
            row.forEach(k => {
                rowDiv.innerHTML += `<div class="key" data-mm="${k[1]}"><span class="en">${k[0]}</span>${k[1]}</div>`;
            });
            kb.appendChild(rowDiv);
        });
        kb.innerHTML += `<div class="kb-row"><div class="key space" data-mm=" ">Space</div></div>`;
    }

    function loadLesson() {
        currentText = lessons[Math.floor(Math.random() * lessons.length)];
        document.getElementById('display-text').innerHTML = currentText.split('').map((c, i) => 
            `<span class="${i===0?'char-next':''}">${c}</span>`
        ).join('');
        charIdx = 0;
        document.getElementById('typing-input').value = "";
    }

    document.getElementById('typing-input').addEventListener('input', (e) => {
        if(!isRunning) startTimer();
        
        const val = e.target.value;
        const spans = document.getElementById('display-text').querySelectorAll('span');
        
        spans.forEach((s, i) => {
            s.className = '';
            if(val[i] == null) {
                if(i === val.length) s.className = 'char-next';
            } else if(val[i] === s.innerText) {
                s.className = 'char-correct';
            } else {
                s.className = 'char-wrong';
            }
        });

        const nextChar = currentText[val.length];
        highlightKey(nextChar);

        if(val.length >= currentText.length) {
            saveScore();
            loadLesson();
        }
    });

    function highlightKey(char) {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        const target = document.querySelector(`.key[data-mm="${char}"]`);
        if(target) target.classList.add('active');
    }

    function startTimer() {
        isRunning = true;
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timer);
                saveScore();
                alert("Time is up!");
                resetTest();
            }
        }, 1000);
    }

    function saveScore() {
        const wpm = Math.round((document.getElementById('typing-input').value.length / 5));
        const userName = prompt("သင့်နာမည်ကို ရိုက်ထည့်ပါ -");
        if(userName) {
            leaderboardData.push({ name: userName, speed: wpm });
            leaderboardData.sort((a,b) => b.speed - a.speed);
            localStorage.setItem('typing_ranks', JSON.stringify(leaderboardData.slice(0, 10)));
            updateLeaderboard();
        }
    }

    function updateLeaderboard() {
        const list = document.getElementById('rank-list');
        list.innerHTML = leaderboardData.map((d, i) => `
            <div class="rank-item">
                <span>${i+1}. ${d.name}</span>
                <b>${d.speed} WPM</b>
            </div>
        `).join('');
    }

    function resetTest() {
        clearInterval(timer);
        timeLeft = 60;
        isRunning = false;
        document.getElementById('timer').innerText = timeLeft;
        loadLesson();
    }
</script>
</body>
</html>
