<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Pro 150 - Aung Phyo Win</title>
    <link href="https://mmwebfonts.comquas.com/fonts/pyidaungsu.css" rel="stylesheet">
    <style>
        :root { --main: #0f172a; --accent: #fbbf24; --bg: #f8fafc; --white: #ffffff; --key: #e2e8f0; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Lock Screen */
        #lock-screen { position: fixed; inset: 0; background: var(--main); z-index: 10000; display: flex; justify-content: center; align-items: center; color: white; transition: 0.5s; }
        .lock-box { background: #1e293b; padding: 50px; border-radius: 25px; border: 2px solid var(--accent); text-align: center; box-shadow: 0 0 30px rgba(251, 191, 36, 0.2); }
        .lock-box h1 { color: var(--accent); margin-bottom: 20px; }
        .lock-box input { padding: 12px; font-size: 20px; border-radius: 8px; border: none; width: 250px; text-align: center; margin-bottom: 20px; }
        .lock-box button { background: var(--accent); color: #000; padding: 12px 40px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Sidebar */
        .sidebar { width: 350px; background: var(--main); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; background: #1e293b; border-bottom: 4px solid var(--accent); text-align: center; }
        .lesson-list { flex: 1; overflow-y: auto; padding: 15px; }
        .lesson-btn { width: 100%; padding: 15px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border: none; color: #cbd5e1; border-radius: 10px; cursor: pointer; text-align: left; transition: 0.2s; }
        .lesson-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        .grp-tag { font-size: 12px; color: var(--accent); padding: 20px 5px 5px; text-transform: uppercase; border-bottom: 1px solid #334155; display: block; }

        /* Main App */
        .app { flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .typing-area { background: var(--white); width: 100%; max-width: 1100px; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        
        #text-box { font-size: 26px; line-height: 2; padding: 30px; background: #fdfdfd; border: 1px solid #e2e8f0; border-radius: 15px; margin-bottom: 20px; text-align: justify; color: #1e293b; min-height: 320px; }
        .curr { border-bottom: 4px solid var(--accent); background: #fef3c7; }
        .correct { color: #10b981; }
        .wrong { background: #ef4444; color: white; border-radius: 5px; }

        input#user-input { width: 100%; padding: 20px; font-size: 24px; border: 2px solid #e2e8f0; border-radius: 15px; outline: none; margin-bottom: 20px; font-family: 'Pyidaungsu'; }

        /* Hands */
        .hands-guide { display: flex; justify-content: center; gap: 100px; margin-bottom: 25px; }
        .hand { position: relative; width: 180px; height: 120px; opacity: 0.8; }
        .finger { position: absolute; width: 32px; height: 45px; background: #ffdbac; border-radius: 15px 15px 5px 5px; border: 1px solid #d1a684; transition: 0.1s; }
        .finger.active { background: var(--accent); transform: translateY(-10px); box-shadow: 0 5px 15px rgba(251, 191, 36, 0.4); }
        #L5{left:0;top:40px} #L4{left:35px;top:15px} #L3{left:70px;top:5px} #L2{left:105px;top:15px} #L1{left:140px;top:85px;width:40px;border-radius:20px}
        #R1{right:140px;top:85px;width:40px;border-radius:20px} #R2{right:105px;top:15px} #R3{right:70px;top:5px} #R4{right:35px;top:15px} #R5{right:0;top:40px}

        /* Keyboard UI (Full Visual) */
        .keyboard { background: #334155; padding: 20px; border-radius: 15px; width: 100%; margin-top: 10px; box-shadow: inset 0 0 10px #000; }
        .kb-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
        .k { background: #f8fafc; min-width: 50px; height: 55px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; border-bottom: 5px solid #cbd5e1; flex: 1; position: relative; cursor: default; }
        .k.active { background: var(--accent); border-bottom: none; transform: translateY(4px); }
        .k .sh { position: absolute; top: 3px; left: 5px; font-size: 11px; color: #94a3b8; }
        .k.sp { flex: 8; background: #e2e8f0; }

        .service-info { margin-top: 30px; text-align: center; background: #f1f5f9; padding: 15px; border-radius: 12px; }
        .service-info a { color: #2563eb; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <h1>MASTER KEY ACCESS</h1>
        <p>AUNG PHYO WIN Typing Software ကိုဝင်ရန်</p>
        <input type="password" id="pass" placeholder="Password ကိုရိုက်ပါ">
        <br>
        <button onclick="unlock()">ACCESS NOW</button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="color:var(--accent); margin:0;">AUNG PHYO WIN</h2>
        <small>Master Typing Pro v2.0</small>
    </div>
    <div class="lesson-list" id="nav-list"></div>
</div>

<div class="app">
    <div class="typing-area">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold;">
            <span id="cur-title" style="color:#64748b">Lesson Loading...</span>
            <span style="color:var(--accent)">WPM: <span id="wpm-count">0</span></span>
        </div>
        <div id="text-box"></div>
        <input type="text" id="user-input" placeholder="စာကို တိကျမှန်ကန်အောင် စတင်ရိုက်နှိပ်ပါ..." autocomplete="off">

        <div class="hands-guide">
            <div class="hand"><div id="L5" class="finger"></div><div id="L4" class="finger"></div><div id="L3" class="finger"></div><div id="L2" class="finger"></div><div id="L1" class="finger"></div></div>
            <div class="hand"><div id="R1" class="finger"></div><div id="R2" class="finger"></div><div id="R3" class="finger"></div><div id="R4" class="finger"></div><div id="R5" class="finger"></div></div>
        </div>

        <div class="keyboard" id="full-kb"></div>

        <div class="service-info">
            💬 ဖောက်သည်ဝန်ဆောင်မှုသို့ ဆက်သွယ်ရန် - <a href="mailto:aungphyo52967@gmail.com">aungphyo52967@gmail.com</a>
        </div>
    </div>
</div>

<script>
    // Password: aungphyo529
    function unlock() {
        if(document.getElementById('pass').value === "aungphyo529") {
            document.getElementById('lock-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('lock-screen').remove(), 500);
        } else { alert("Password မှားယွင်းနေပါသည်။"); }
    }

    const lessons = [];
    const alphabetLong = "ကကြီး ကလေး ငို၊ ကိုကို ချော့လို့ နို့စို့စို့။ ခကွေး ကွေးကွေး၊ ခွေးကလေးကို ကျွေးကျွေး။ ဂငယ် ငယ်ငယ်၊ ငါးကလေး ဖမ်းမယ်။ ဃကြီး ကြီးမား၊ ဆင်ကြီး သွား။ င ကလေး ငြိမ်ငြိမ်၊ အိမ်မှာ ထိုင်။ စလုံး လုံးလုံး၊ ထမင်းလုံးကို စား။ ဆလိမ် လိမ်လိမ်၊ ကြိုးကလေးကို လိမ်။ ဇကွဲ ကွဲကွဲ၊ အိုးကလေး ကွဲ။ ဈမျဉ်းဆွဲ ဆွဲ၊ စာကြောင်း ဆွဲ။ ညလေး လေးလေး၊ ကလေးငယ် လေး။ ဋသန်လျင်းချိတ် ချိတ်၊ တံငါသည် ချိတ်။ ဌဝမ်းဘဲ ဘဲ၊ ရေထဲမှာ ဘဲ။ ဍရင်ကောက် ကောက်၊ လမ်းကလေး ကောက်။ ဎရေမှုတ် မှုတ်၊ ရေကို မှုတ်။ ဏကြီး ကြီးမား၊ ဂုဏ်အင်္ဂါ များ။ တဝမ်းပူ ပူ၊ ထမင်းအိုး ပူ။ ထဆင်ထူး ထူး၊ ထူးထူး ခြားခြား။ ဒဒွေး ဒွေးဒွေး၊ ဒေါ်ဒေါ် ပေး။ ဓအလံထူ ထူ၊ အလံကို ထူ။ နငယ် ငယ်ငယ်၊ ညီမလေး ငယ်။ အ အအေး၊ အအေးကို သောက်။";

    // 1-20 Alphabet
    for(let i=1; i<=20; i++) {
        lessons.push({ title: `အခန်း ${i}: ဗျည်းကဗျာရှည်`, text: alphabetLong + " မြန်မာစာပေ၏ အခြေခံဗျည်းများကို ကျွမ်းကျင်စွာ ရိုက်နှိပ်နိုင်ရန် ဤလေ့ကျင့်ခန်းကို အနည်းဆုံး ၅ ကြိမ်စီ လေ့ကျင့်ပေးပါ။" });
    }
    // 21-50 History
    for(let i=21; i<=50; i++) {
        lessons.push({ title: `အခန်း ${i}: မြန်မာ့သမိုင်းကြောင်း`, text: "မြန်မာ့သမိုင်းသည် ပုဂံခေတ်မှ စတင်၍ ကြီးကျယ်ခမ်းနားခဲ့ပါသည်။ အနော်ရထာမင်းကြီးသည် ပထမမြန်မာနိုင်ငံတော်ကြီးကို တည်ထောင်ခဲ့ပြီး ဗုဒ္ဓဘာသာကို ထွန်းကားစေခဲ့သည်။ အင်းဝ၊ တောင်ငူ နှင့် ကုန်းဘောင်ခေတ်များအထိ မြန်မာ့စစ်အင်အားနှင့် ယဉ်ကျေးမှုတို့သည် အရှေ့တောင်အာရှတွင် ထင်ရှားခဲ့ပါသည်။ သူ့ကျွန်ဘဝမှ လွတ်မြောက်ရန် ဗိုလ်ချုပ်အောင်ဆန်းနှင့်တကွ အာဇာနည်ခေါင်းဆောင်ကြီးများက အသက်ပေး ကြိုးပမ်းခဲ့ကြပါသည်။" });
    }
    // 51-100 Cities
    for(let i=51; i<=100; i++) {
        lessons.push({ title: `အခန်း ${i}: မြန်မာပြည်မှမြို့ပြများ`, text: "ရန်ကုန်မြို့သည် စီးပွားရေးမြို့တော်ဖြစ်ပြီး ရွှေတိဂုံစေတီတော်ကြီး တည်ရှိပါသည်။ မန္တလေးမြို့သည် ယဉ်ကျေးမှုမြို့တော်ဖြစ်ပြီး နန်းမြို့ဟောင်း ရှိပါသည်။ နေပြည်တော်သည် အုပ်ချုပ်ရေးမြို့တော်ဖြစ်ပြီး ကျယ်ဝန်းသော လမ်းမကြီးများ ရှိပါသည်။ တောင်ကြီးမြို့သည် အေးမြသော ရာသီဥတုရှိပြီး မီးပုံးပျံပွဲတော်ကြောင့် နာမည်ကျော်ပါသည်။ မော်လမြိုင်၊ ပုသိမ် နှင့် မြစ်ကြီးနားမြို့များသည်လည်း မိမိတို့၏ ထူးခြားသော သဘာဝအလှတရားများဖြင့် ပြည့်နှက်နေပါသည်။" });
    }
    // 101-150 Songs
    for(let i=101; i<=150; i++) {
        lessons.push({ title: `အခန်း ${i}: သီချင်းစာသားများ`, text: "မြန်မာပြည်ကြီး ငြိမ်းချမ်းပါစေ၊ တို့မြေ တို့ရေ တို့ချစ်တဲ့မြေ။ သာယာလှပတဲ့ တောတောင်ရေမြေများနဲ့ ပြည့်စုံတဲ့ မြန်မာပြည်ကြီးမှာ တို့အားလုံး စည်းစည်းလုံးလုံး နေထိုင်ကြမယ်။ ကမ္ဘာတည်သရွေ့ မြန်မာပြည်သည် တို့ရဲ့ အမိမြေ ဖြစ်ပါသည်။ သွေးချင်းတို့ရဲ့ အချစ်များဖြင့် တည်ဆောက်ထားသော နိုင်ငံတော်ကြီး ဖြစ်ပါသည်။" });
    }

    const kbLayout = [
        [{n:'ဆ',s:'ဍ'},{n:'တ',s:'ဋ'},{n:'န',s:'ဏ'},{n:'မ',s:'ဣ'},{n:'အ',s:'ဤ'},{n:'ပ',s:'ဥ'},{n:'က',s:'ဦ'},{n:'င',s:'ဧ'},{n:'သ',s:'သြ'},{n:'စ',s:'၌'}],
        [{n:'ေ',s:'ဗ'},{n:'ှ',s:'ှ'},{n:'ိ',s:'ီ'},{n:'်',s:'်'},{n:'ါ',s:'ာ'},{n:'့',s:'့'},{n:'ြ',s:'ွ'},{n:'ု',s:'ူ'},{n:'ူ',s:'ူး'},{n:'း',s:'၏'}],
        [{n:'ဖ',s:'ဃ'},{n:'ထ',s:'ဌ'},{n:'ခ',s:'ခြ'},{n:'လ',s:'ဠ'},{n:'ဘ',s:'ဘ'},{n:'ည',s:'ည'},{n:'ာ',s:'ါ'},{n:'ယ',s:'၌'},{n:'ဝ',s:'၎'}]
    ];

    const fMap = {'ဆ':'L5','ေ':'L5','ဖ':'L5','တ':'L4','ှ':'L4','ထ':'L4','န':'L3','ိ':'L3','ခ':'L3','မ':'L2','အ':'L2','်':'L2','ါ':'L2','လ':'L2','ဘ':'L2','ပ':'R2','က':'R2','့':'R2','ြ':'R2','ည':'R2','ာ':'R2','င':'R3','ု':'R3','ယ':'R3','သ':'R4','ဝ':'R4','စ':'R5','း':'R5',' ':'R1'};

    let curIdx = 0, timer = null;

    function init() {
        const nav = document.getElementById('nav-list');
        let curGrp = "";
        lessons.forEach((l, i) => {
            let grp = i < 20 ? "ဗျည်းကဗျာ (က-အ)" : i < 50 ? "မြန်မာ့သမိုင်း" : i < 100 ? "မြို့ပြများ" : "သီချင်းစာသား";
            if(grp !== curGrp) {
                const s = document.createElement('span'); s.className = 'grp-tag'; s.innerText = grp; nav.appendChild(s); curGrp = grp;
            }
            const b = document.createElement('button'); b.className = 'lesson-btn'; b.innerText = l.title;
            b.onclick = () => loadLesson(i); nav.appendChild(b);
        });

        const kb = document.getElementById('full-kb');
        kbLayout.forEach(r => {
            const d = document.createElement('div'); d.className = 'kb-row';
            r.forEach(key => d.innerHTML += `<div class="k" data-n="${key.n}" data-s="${key.s}"><span class="sh">${key.s}</span>${key.n}</div>`);
            kb.appendChild(d);
        });
        kb.innerHTML += `<div class="kb-row"><div class="k sp" data-n=" ">SPACE BAR</div></div>`;
        loadLesson(0);
    }

    function loadLesson(idx) {
        curIdx = idx;
        document.getElementById('cur-title').innerText = lessons[idx].title;
        document.getElementById('text-box').innerHTML = lessons[idx].text.split('').map((c,i) => `<span class="${i===0?'curr':''}">${c}</span>`).join('');
        document.getElementById('user-input').value = '';
        document.querySelectorAll('.lesson-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
        updateVisuals(lessons[idx].text[0]);
        timer = null;
    }

    function updateVisuals(c) {
        document.querySelectorAll('.k, .finger').forEach(el => el.classList.remove('active'));
        let k = document.querySelector(`.k[data-n="${c}"]`) || document.querySelector(`.k[data-s="${c}"]`);
        if(k) k.classList.add('active');
        if(fMap[c]) document.getElementById(fMap[c]).classList.add('active');
    }

    document.getElementById('user-input').addEventListener('input', (e) => {
        if(!timer) timer = new Date();
        const v = e.target.value, t = lessons[curIdx].text, spans = document.getElementById('text-box').querySelectorAll('span');
        spans.forEach((s, i) => s.className = (v[i] == null) ? (i === v.length ? 'curr' : '') : (v[i] === s.innerText ? 'correct' : 'wrong'));
        updateVisuals(t[v.length] || '');
        document.getElementById('wpm-count').innerText = Math.round((v.length/5)/((new Date()-timer)/60000)) || 0;
        if(v === t) { if(curIdx < 149) loadLesson(curIdx+1); }
    });

    init();
</script>
</body>
</html>
