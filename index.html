<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aung Phyo Win - Typing Master Pro</title>
    <link href="https://mmwebfonts.comquas.com/fonts/pyidaungsu.css" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --main: #1a1a2e; --accent: #f39c12; --skin: #ffe0bd; --white: #fff; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: var(--main); color: white; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.3); }
        .sidebar-header { padding: 20px; background: #16213e; border-bottom: 3px solid var(--accent); text-align: center; }
        .moving-name { font-size: 20px; font-weight: bold; color: var(--accent); white-space: nowrap; animation: marquee 12s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .lesson-list { flex: 1; overflow-y: auto; padding: 10px; }
        .group-tag { font-size: 11px; color: #888; padding: 10px 5px; border-bottom: 1px solid #333; display: block; }
        .lesson-btn { width: 100%; padding: 12px; margin-bottom: 5px; background: rgba(255,255,255,0.05); border: none; color: #ddd; border-radius: 6px; cursor: pointer; text-align: left; font-size: 14px; }
        .lesson-btn.active { background: var(--accent); color: white; }

        /* Customer Service Section */
        .service-box { padding: 15px; background: #0f3460; font-size: 12px; border-top: 1px solid var(--accent); }
        .service-box a { color: var(--accent); text-decoration: none; font-weight: bold; }

        /* Main Content */
        .content { flex: 1; padding: 25px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .app-card { background: var(--white); width: 100%; max-width: 1000px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        #text-display { font-size: 24px; line-height: 2; padding: 25px; background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; margin-bottom: 20px; text-align: justify; min-height: 250px; }
        .char-next { border-bottom: 4px solid var(--accent); background: #fffbe6; }
        .char-correct { color: #2ecc71; }
        .char-wrong { background: #e74c3c; color: white; border-radius: 4px; }

        input { width: 100%; padding: 15px; font-size: 22px; border: 2px solid #ddd; border-radius: 10px; outline: none; margin-bottom: 20px; font-family: 'Pyidaungsu'; }

        /* Hand Guide */
        .hands-ui { display: flex; justify-content: center; gap: 70px; margin-bottom: 20px; }
        .hand { position: relative; width: 170px; height: 110px; }
        .finger { position: absolute; width: 28px; height: 40px; background: var(--skin); border-radius: 14px 14px 5px 5px; border: 1px solid #c8a165; transition: 0.2s; }
        .finger.active { background: var(--accent); transform: translateY(-8px); box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4); border-color: white; }
        
        #L5 { left: 0; top: 40px; } #L4 { left: 35px; top: 15px; } #L3 { left: 70px; top: 5px; } #L2 { left: 105px; top: 15px; } #L1 { left: 140px; top: 75px; width: 40px; border-radius: 20px; }
        #R1 { right: 140px; top: 75px; width: 40px; border-radius: 20px; } #R2 { right: 105px; top: 15px; } #R3 { right: 70px; top: 5px; } #R4 { right: 35px; top: 15px; } #R5 { right: 0; top: 40px; }

        /* Keyboard */
        .keyboard { background: #2c3e50; padding: 15px; border-radius: 15px; width: 100%; }
        .kb-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 6px; }
        .key { background: #f8f9fa; min-width: 45px; height: 50px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border-bottom: 4px solid #d1d8e0; flex: 1; position: relative; }
        .key.active { background: var(--accent); color: white; border-bottom: none; transform: translateY(3px); }
        .key .sh-label { position: absolute; top: 2px; left: 5px; font-size: 10px; color: #a1a1a1; }
        .key.space { flex: 8; }
        .key.func { background: #d1d8e0; flex: 1.5; }
    </style>
</head>

        <div class="keyboard" id="kb-ui"></div>
