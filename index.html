<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Typing Pro - Master Edition</title>
    <link href="https://mmwebfonts.comquas.com/fonts/pyidaungsu.css" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --primary: #2c3e50; --accent: #e67e22; --skin: #ffdbac; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .app-container { background: white; width: 98%; max-width: 800px; padding: 15px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); margin-top: 10px; }
        
        /* Lesson List Horizontal Scroll */
        .lesson-list { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; border-bottom: 2px solid #eee; margin-bottom: 15px; scroll-behavior: smooth; }
        .lesson-item { flex: 0 0 auto; padding: 8px 15px; background: #eee; border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .lesson-item.active { background: var(--primary); color: white; }

        .info-bar { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; color: var(--primary); }
        
        /* Interactive Hands ABOVE Input */
        .hands-area { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 10px; }
        .hand-svg { width: 140px; height: auto; }
        .finger { fill: var(--skin); stroke: #d35400; stroke-width: 1.2; transition: 0.2s; transform-origin: center bottom; }
        .active-finger { fill: var(--accent) !important; transform: translateY(-8px) scaleY(1.08); }

        #display-text { font-size: 24px; background: #fdfdfd; padding: 15px; border-radius: 10px; min-height: 60px; line-height: 1.6; border: 1px solid #ddd; margin-bottom: 10px; }
        .correct { color: #27ae60; }
        .incorrect { background: #e74c3c; color: white; border-radius: 3px; }
        .active-char { border-bottom: 3px solid var(--accent); animation: blink 1s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }

        input { width: 100%; padding: 12px; font-size: 20px; border: 2px solid #ddd; border-radius: 8px; outline: none; font-family: 'Pyidaungsu'; box-sizing: border-box; }

        /* Real Keyboard Layout */
        .keyboard { background: #34495e; padding: 10px; border-radius: 10px; margin-top: 15px; width: 100%; box-sizing: border-box; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
        .key { background: #ecf0f1; color: #2c3e50; width: 8%; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 14px; font-weight: bold; border-bottom: 3px solid #bdc3c7; }
        .key.active-kb { background: var(--accent); color: white; border-bottom: none; transform: translateY(2px); }
        .key.space { width: 40%; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lesson-list" id="lesson-list"></div>

    <div class="info-bar">
        <div id="lesson-label">အခန်း ၁: ကကြီး ကဗျာ</div>
        <div>WPM: <span id="wpm">0</span></div>
    </div>

    <div class="hands-area">
        <svg class="hand-svg" viewBox="0 0 200 200">
            <path id="L5" class="finger" d="M30,120 Q30,60 50,60 L60,60 Q80,60 80,120 Z" />
            <path id="L4" class="finger" d="M60,110 Q60,40 80,40 L90,40 Q110,40 110,110 Z" />
            <path id="L3" class="finger" d="M95,100 Q95,30 115,30 L125,30 Q145,30 145,100 Z" />
            <path id="L2" class="finger" d="M130,110 Q130,50 150,50 L160,50 Q180,50 180,110 Z" />
            <path id="L1" class="finger" d="M160,150 Q195,150 195,185 L175,205 Q140,205 140,170 Z" />
        </svg>
        <svg class="hand-svg" viewBox="0 0 200 200">
            <path id="R1" class="finger" d="M40,150 Q5,150 5,185 L25,205 Q60,205 60,170 Z" />
            <path id="R2" class="finger" d="M20,110 Q20,50 40,50 L50,50 Q70,50 70,110 Z" />
            <path id="R3" class="finger" d="M55,100 Q55,30 75,30 L85,30 Q105,30 105,100 Z" />
            <path id="R4" class="finger" d="M90,110 Q90,40 110,40 L120,40 Q140,40 140,110 Z" />
            <path id="R5" class="finger" d="M120,120 Q120,60 140,60 L150,60 Q170,60 170,120 Z" />
        </svg>
    </div>

    <div id="display-text"></div>
    <input type="text" id="input-field" placeholder="ဒီမှာ စတင်ရိုက်နှိပ်ပါ..." autocomplete="off" autofocus>

    <div class="keyboard">
        <div class="kb-row">
            <div class="key" data-char="ဆ">ဆ</div><div class="key" data-char="တ">တ</div><div class="key" data-char="န">န</div><div class="key" data-char="မ">မ</div><div class="key" data-char="အ">အ</div>
            <div class="key" data-char="ပ">ပ</div><div class="key" data-char="က">က</div><div class="key" data-char="င">င</div><div class="key" data-char="သ">သ</div><div class="key" data-char="စ">စ</div>
        </div>
        <div class="kb-row">
            <div class="key" data-char="ေ">ေ</div><div class="key" data-char="ှ">ှ</div><div class="key" data-char="ိ">ိ</div><div class="key" data-char="်">်</div><div class="key" data-char="ါ">ါ</div>
            <div class="key" data-char="့">့</div><div class="key" data-char="ြ">ြ</div><div class="key" data-char="ု">ု</div><div class="key" data-char="ူ">ူ</div><div class="key" data-char="း">း</div>
        </div>
        <div class="kb-row">
            <div class="key" data-char="ဖ">ဖ</div><div class="key" data-char="ထ">ထ</div><div class="key" data-char="ခ">ခ</div><div class="key" data-char="လ">လ</div><div class="key" data-char="ဘ">ဘ</div>
            <div class="key" data-char="ည">ည</div><div class="key" data-char="ာ">ာ</div><div class="key" data-char="ယ">ယ</div><div class="key" data-char="ဝ">ဝ</div><div class="key" data-char="၏">၏</div>
        </div>
        <div class="kb-row"><div class="key space" data-char=" ">Space</div></div>
    </div>
</div>

<script>
    const lessons = {
        1: { title: "ကကြီး ကဗျာ", text: "ကကြီး ကလေး ငို၊ ကိုကို ချော့လို့ နို့စို့စို့။" },
        2: { title: "ခကွေး ကဗျာ", text: "ခကွေး ကွေးကွေး၊ ခွေးကလေးကို ကျွေးကျွေး။" },
        3: { title: "ဂငယ် ကဗျာ", text: "ဂငယ် ငယ်ငယ်၊ ငါးကလေး ဖမ်းမယ်။" }
    };
    for(let i=4; i<=50; i++) lessons[i] = { title: `အခန်း ${i}`, text: "မြန်မာစာ လေ့ကျင့်ခန်းများကို မှန်ကန်အောင် ရိုက်နှိပ်ပါ။" };

    const fingerMap = {
        'ဆ':'L5','ေ':'L5','ဖ':'L5','တ':'L4','ှ':'L4','ထ':'L4','န':'L3','ိ':'L3','ခ':'L3','မ':'L2','အ':'L2','်':'L2','ါ':'L2','လ':'L2','ဘ':'L2',
        'ပ':'R2','က':'R2','့':'R2','ြ':'R2','ည':'R2','ာ':'R2','င':'R3','ု':'R3','ယ':'R3','သ':'R4','ူ':'R4','ဝ':'R4','စ':'R5','း':'R5','၏':'R5',' ':'R1'
    };

    let currentLvl = 1;
    const display = document.getElementById('display-text');
    const input = document.getElementById('input-field');

    function loadLesson(lvl) {
        currentLvl = lvl;
        document.getElementById('lesson-label').innerText = `အခန်း ${lvl}: ${lessons[lvl].title}`;
        display.innerHTML = '';
        lessons[lvl].text.split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.innerText = char;
            if(i === 0) span.classList.add('active-char');
            display.appendChild(span);
        });
        input.value = '';
        updateVisuals(lessons[lvl].text[0]);
        renderNav();
    }

    function updateVisuals(char) {
        // Update Fingers
        document.querySelectorAll('.finger').forEach(f => f.classList.remove('active-finger'));
        const fingerId = fingerMap[char];
        if(fingerId) document.getElementById(fingerId).classList.add('active-finger');

        // Update Keyboard Keys
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active-kb'));
        const keyEl = document.querySelector(`.key[data-char="${char}"]`);
        if(keyEl) keyEl.classList.add('active-kb');
    }

    input.addEventListener('input', () => {
        const val = input.value.split('');
        const chars = display.querySelectorAll('span');
        chars.forEach((span, i) => {
            span.classList.remove('active-char', 'correct', 'incorrect');
            if (val[i] == null) {
                if(i === val.length) span.classList.add('active-char');
            } else if (val[i] === span.innerText) span.classList.add('correct');
            else span.classList.add('incorrect');
        });
        updateVisuals(lessons[currentLvl].text[val.length] || '');
        if(input.value === lessons[currentLvl].text) setTimeout(() => loadLesson(currentLvl + 1), 500);
    });

    function renderNav() {
        const nav = document.getElementById('lesson-list');
        nav.innerHTML = '';
        for(let i=1; i<=50; i++) {
            const div = document.createElement('div');
            div.className = `lesson-item ${i === currentLvl ? 'active' : ''}`;
            div.innerText = `အခန်း ${i}`;
            div.onclick = () => loadLesson(i);
            nav.appendChild(div);
        }
    }
    loadLesson(1);
</script>
</body>
</html>
